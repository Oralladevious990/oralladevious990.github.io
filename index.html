      "summary": "IT之家 7 月 12 日消息，大疆近期在深圳举办的“珠峰使命”媒体沟通会中分享了中国科考队“巅峰使命”任务细节，公司携旗下首款垂直起降运载无人机 DJI EV50、运载无人机 FC100 及行业测绘无人机 M4E 配合中国科考队顺利完成极高海拔大气数据采集任务，并首次完成昆布冰川核心区的厘米级三维建模。 大疆表示，其中 DJI EV50 无人机综合了多旋翼垂直起降与固定翼高效巡航的综合能力，能够灵活适应珠峰的复杂地形，凭借其纯电无尾气特性，也从源头上保障了探测仪器的精度。 ▲ DJI EV50 垂直起降运载无人机（下同） 在今年中国科考队任务中， 该无人机累计完成 32 架次起降，其中 12 架次专门搭载大气数据采集设备执行螺旋上升及往复飞行 ，最终达到 8861 米的最高飞行海拔，最大连续爬升高度 3730 米，成功抵达了科考所需的目标高度。这一任务标志着中国科考队首次借助无人机在极高海拔对流层完成对大气污染物的精细观测，为相关研究提供了重要支撑。 而在南坡，大疆与尼泊尔无人机服务公司 AirLift 进行合作，利用运载无人机 FC100 及行业测绘无人机 M4E 打造覆盖物资转运、冰川测绘、应急救援与环保清运的综合运营方案。 针对物资补给与环保清运，大疆运载无人机 FC100 在珠峰大本营与一号营地之间建立了“上行补给、下行清运”的空中通道， 2026 登山季累计运输物资超过 10 吨。其中包括往返转运约 2300 个氧气瓶，以及清运近 3000 公斤的高海拔废弃物 。以往向导冒着雪崩与冰裂缝危险耗时数小时的单次运输，如今无人机约 8 分钟即可完成，不仅效率提升数倍，还大幅降低了人员风险。 ▲ DJI FC100 运载无人机在珠峰南坡运送物资 此外，大疆 M4E（Matrice 4E）测绘无人机 首次完成了昆布冰川核心区超 3 平方公里的厘米级 3D 建模 ，精准覆盖大本营、昆布冰瀑全段及一号营地以上地带，全程仅耗时 3.5 小时。基于高分辨率冰川情报，负责修路的夏尔巴向导在进场前即可精准掌握冰裂缝的情况，提前计算所需梯子与绳索等物资，减少在危险区域的暴露时间，使路线规划更加迅速、科学。 ▲ DJI M4E 测绘无人机在珠峰南坡为“昆布冰川”建模",

      "summary": "IT之家 7 月 12 日消息，据上海证券报，宇树科技创始人王兴兴 7 月 10 日在 2026 王府井论坛上作为行业代表发表主题演讲。在演讲中，王兴兴给出了明确判断：“ 机器人最终一定会走向更广阔的市场，走向普通消费者，走向真实的生活 。” IT之家注意到，王兴兴将机器人当前的大众价值拆解为三个核心方向： 首先， 今天的机器人就像 30 年前的个人电脑 ，正在成为专业开发者和科技爱好者开展前沿 AI 技术创新实践的重要二次开发创作平台。越来越多的创作者可以依托机器人研究新算法、开发新功能，机器人也由此不再是小众的科技玩具，更成为连接大众消费、开发者创新和未来产业应用的关键入口。 其次， 机器人正在快速进入家庭和亲子场景 。机器人可以成为孩子接触科学、理解工程、培养创新兴趣的重要媒介，让国内的中小学生在成长阶段就能接触到全球顶尖高校实验室的同款前沿产品。 此外， 机器人正在为商业演出和品牌宣传场景提供全新的情绪价值 。当下的消费市场越来越重视体验感与传播属性，无论是商场活动、品牌发布会、企业展厅还是文旅演出，机器人都能快速成为吸引注意力的核心亮点。 王兴兴认为，机器人可以帮助人类完成更多复杂、危险、高强度的工作，不仅能大幅提升生产效率，更能让人类从繁重危险的重复性劳动中解放出来， 把更多精力投入到创造性、管理性的高价值工作中 。 相关阅读： 《 宇树科技陈立：关节电机上游只有铜线、磁铁等原材料供应商，完全自主可控 》 《 宇树科技陈立：机器人目前没有大面积应用，主要原因是具身智能大模型不成熟 》 《 亚洲首店，宇树科技具身智能体验馆 5 月 31 日在上海开业 》",

      "title": "BW2026 七彩虹探展：清新夏日蓝白风格，全系硬件亮相",
      "summary": "7 月 10 日，Bilibili World 2026（以下简称 BW 2026）在上海国家会展中心开幕。游戏硬件品牌七彩虹携旗下全品类产品矩阵亮相 3H 馆 3A21 展台，带来了丰富的体验与互动内容。 与以往七彩虹经典的红黑电竞视觉不同，今年七彩虹展台首次采用蓝、白、粉等更具夏日氛围的清新配色，整体风格更年轻化，也更贴近 BW 现场的泛二次元与潮玩氛围。 本次七彩虹展台共划分为八大主题区域，包括 iGame GeForce RTX 超级玩家体验区、橘猫派对、隐姬幻境、硬核单品展示区、主舞台区、iGame 愿望商店、联名藏宝湾以及冲浪营地等，覆盖硬核 DIY 玩家、电竞爱好者、ACG 用户、内容创作者与潮流生活玩家等多个圈层。 七彩虹方面表示，硬件产品不应只是参数和性能的堆叠，也可以成为用户生活方式和个性表达的一部分。通过本次 BW 2026 展台，七彩虹希望将高性能硬件、原创 IP、潮流文化与互动体验结合起来，为年轻用户呈现更具情感连接的硬件生态。 1、iGame GeForce RTX 超级玩家体验区 作为七彩虹本次展台的技术展示主阵地，iGame GeForce RTX 超级玩家体验区集中展示了七彩虹联合 NVIDIA 带来的 iGame GeForce RTX 50 系列高端显卡产品，涵盖 Vulcan 火神、Advanced、Ultra 以及 Mini 等系列。 现场设置了多组 iGame 全家桶主机，并分为“RTX 游戏体验区”和“RTX AI PC 体验区”两大板块，让玩家能够近距离体验 iGame RTX 50 系高端显卡在游戏与 AI 创作场景中的表现。 在 DLSS 4.5 游戏体验区，七彩虹布置了多台满配旗舰级 iGame Vortex 游戏主机。试玩内容包括支持 DLSS 4.5、光线追踪以及路径追踪技术的热门游戏《鸣潮》《异环》和《明日方舟：终末地》。 其中，《鸣潮》和《异环》的体验机采用 iGame GeForce RTX 5080 Vulcan OC 16GB 显卡，搭配 AMD 锐龙 7 9850X3D 处理器，并组成黑火神全家桶方案。现场玩家可通过 NVIDIA App 启用 6 倍动态多帧生成，并配合 AGON 4K 240Hz 高刷显示器进行体验。 在 iGame GeForce RTX 5080 黑火神显卡加持下，《鸣潮》中的水面反射、开放世界场景光影以及动态战斗画面表现较为稳定；《异环》则通过路径追踪技术呈现更具真实感的城市光影效果。开启 DLSS 4.5 后，即便面对复杂光影和高负载场景，游戏画面依旧保持较高流畅度。 针对《明日方舟：终末地》，七彩虹现场展示了基于 iGame GeForce RTX 5080 Vulcan W OC 16GB 白火神显卡打造的 iGame Vortex 纯白全家桶主机。其借助基于第二代 Transformer 模型的 DLSS 4.5 超分辨率技术，进一步提升游戏中工业系统、场景细节和画面清晰度表现。 除高画质 3A 与二游体验外，七彩虹还在现场设置了低延迟电竞体验内容。iGame GeForce RTX 超级玩家体验区配备 iGame Ultra Family 游戏主机以及 iGame Ultra BTF 3.0 背插宇宙方案，并搭配 2K 260Hz 高刷电竞显示器。 在《无畏契约》和《CS2》等竞技游戏试玩中，NVIDIA Reflex 低延迟技术成为体验重点。该技术面向高刷新率电竞场景，可降低系统延迟，帮助玩家在对枪、转身、瞄准等操作中获得更直接的响应反馈。 值得一提的是，本次展出的 iGame 背插宇宙为首套开售的 Ultra-Z BTF 3.0 整机方案。该方案主打全新装机美学，核心硬件包括 iGame Z890M ULTRA-Z V20 主板及配套电源，通过创新连接方式和全新 50Pin 金手指为 CPU 与主板供电，使机箱正面几乎看不到线材。 现场展示的整机采用 iGame Ultra Z BTF 3.0 主板、显卡、机箱、电源、水冷等完整配置，打造高纯净度白色海景房装机效果，吸引了不少桌搭玩家和 DIY 爱好者驻足观看。 2、RTX AI PC 体验区 在 RTX AI PC 体验区，七彩虹重点展示了 iGame LAB Vulcan Armor 火神战甲定制主机在本地 AI 创作中的能力。 现场演示内容包括 NVIDIA Broadcast 的 AI 增强功能，以及剪映专业版中的 AI 特效。得益于 iGame GeForce RTX 5080 Vulcan W OC 16GB 显卡的双 NVENC 编码器和 AI 算力，剪映中的智能抠像、美颜美体等功能可实现实时预览，视频导出速度也较上一代提升约 1.5 倍。 这意味着 AI PC 正从概念演示进一步走向实际应用。本地大模型、本地视频处理和 AI 工作流，正在成为内容创作者提升效率的重要工具。 iGame LAB Vulcan Armor 火神战甲是由 iGame LAB 联合实验室专为白火神显卡打造的客制化 ITX 整机。该机采用全铝压铸机身，整体造型偏向赛博机甲风格，顶部配备磁吸 LCD 智屏，外观形态类似一块大型显卡。七彩虹希望通过这类高度集成的客制化整机，为直播、AI 创作等特定场景提供开箱即用的一站式解决方案，降低普通用户使用前沿硬件与 AI 工作流的门槛。 3、硬核单品展区 硬核单品展示区是七彩虹本次 BW 2026 展台中兼具专业度和人气的区域之一。该区域覆盖显卡、主板、存储、音频外设等 DIY 核心硬件，基本覆盖玩家装机所需的主要部件。 其中，iGame X870E VULCAN W OC V14 是面向 AMD 平台的 X3D 全能旗舰主板。该主板延续圣白智械设计语言，采用 18+2+2 相旗舰供电，支持 X3D AI 智能超频，内存超频可突破 10600MT/s，并提供 5 个全速 M.2 接口以及完整 PCIe 5.0 支持。同时，主板搭载火神 LCD 智屏和强化散热模组，兼顾外观与性能。 iGame Z890 VULCAN X 则面向 Intel Core Ultra 200S 平台，采用黑火神设计语言，并加入无限镜赛博风格。其 VRM 区域配备霓虹灯效，整体视觉辨识度较高。 iGame B850I MINI OC 是 iGame MINI 家族首款 ITX 主板，支持异步超频，面向迷你主机和小体积高性能装机用户。 音频外设方面，SIGAPES Sentry 头戴式电竞耳机支持 PC、主机、移动设备等多平台连接，配备四种连接模式，并采用新一代 7.1 多声道环绕技术，主打沉浸式听声辨位体验。 SIGAPES 新品“琢”入耳式 HIFI 级游戏耳机，则定位为兼顾电竞和音乐的入耳式产品。 该耳机由 COLORFLY 专业 HIFI 团队调校，采用双磁双腔体结构，并配备金属机身，兼顾质感、耐用性与佩戴风格。 4、联名藏宝湾 在联名藏宝湾区域，七彩虹展示了多款联名和限定产品，覆盖显卡、外设等多个品类，兼具硬件性能和收藏属性。 其中，iGame GeForce RTX 5070 Ultra OC 12GB x 007 First Light Edition 采用黑金配色，整体风格呼应特工题材，面向 007 影迷与游戏玩家。 iGame GeForce RTX 5090 D v2 ARCANIX OC 24GB 三十周年限定显卡，则采用复刻宫殿构图与拱形银柱设计，并以白金色调呈现典藏级定位。 此外，赤兔 MAG-60 键盘为全球限量 300 台产品，设计灵感来自汉代美学，将丹红朱印、皮革工艺与电竞外设结合，主打东方美学与现代硬件的融合。 5、原创 IP 场景化落地 本届 BW 2026 上，七彩虹旗下原创 IP 也进一步与硬件产品结合。橘猫派对、隐姬幻境以及柒小希相关产品共同构成七彩虹原创 IP 的场景化展示内容。 COLORFIRE MEOW 家族带来了全新橘舍主机，这是 MEOW 家族首款治愈系萌宠整机。该主机整体采用温暖居家化设计，前面板融入木纹装饰，顶部设计有猫耳轮廓，开机键则采用仿生“猫爪”造型，弱化了传统机箱的工业感，更适合融入家庭或桌搭场景。 配置方面，橘舍主机搭载 AMD 锐龙 7 9850X3D 处理器和 COLORFIRE GeForce RTX 5070 橘影橙显卡，兼顾外观风格与 3A 游戏性能。 橘猫派对展区还展示了 COLORFIRE MEOW R16 Ultra 高端潮玩游戏本。该机搭载锐龙 9 9850HX 处理器和满功耗 RTX 50 系笔记本电脑 GPU，配备 2.5K、300Hz 高刷屏，采用超薄全金属机身，并通过六热管散热系统应对高负载场景。 隐姬幻境展区则以隐姬 IP 世界观为核心，打造沉浸式二次元科幻电竞空间。该展区围绕隐星游戏本和青羽系列键盘展开，将 ACG 风格、赛博视觉和电竞硬件进行结合。 隐星 P16 Pro 高性能游戏本采用“宇宙战舰”科幻外观和“雾屿白”配色，面向二次元玩家打造。硬件方面，该机搭载 RTX 50 系列笔记本电脑 GPU 和 Intel HX 处理器，在轻薄便携、性能表现和定价之间寻求平衡。 青羽系列电竞键盘以隐姬 IP 的赛博世界观为灵感，采用机械轴体和 RGB 灯效，与隐星游戏本共同构成二次元风格电竞桌面生态。 此外，柒小希限定显卡 iGame GeForce RTX 5070 Advanced OC 柒小希首发纪念版也在现场亮相。该显卡将柒小希 IP 形象与 Advanced 系列金属质感结合，采用红白配色，兼具视觉辨识度和收藏价值。 6、冲浪营地 在“冲浪营地”互动区，七彩虹设置了热门游戏试玩内容，并将该区域作为笔记本产品线的集中展示阵地，覆盖潮玩电竞、专业创作和轻薄办公等多类移动算力产品。 其中，iGame M15 Origo 是 iGame 品牌高端电竞旗舰产品，配备 300Hz 高刷新率屏幕，主打高帧率竞技体验。 灵创 K16 则是七彩虹本次展出的代表性工作站新品之一，搭载 AMD 锐龙 AI Max+ 395 平台，并配备 128GB 统一内存，面向专业创作和高负载生产力场景。 同时，iGame M15 / M16 Origo 作为 iGame 旗下高端移动电竞旗舰系列，也在现场亮相，继续以高刷屏和高性能配置面向核心电竞玩家。 7、主舞台区 主舞台区是七彩虹展台的人气核心。现场安排了原创“热 i 一夏”舞曲表演，以及人气舞团 BellyStar 秉星带来的“舞力盛夏 SHOW”，持续带动现场氛围。 同时，柒小希、橘宝、隐姬三大品牌 IP COSER 也在主舞台区域集结，通过近距离互动、趣味游戏和周边派送，与现场玩家进行交流。 七彩虹的好友林树也惊喜现身，与玩家互动，并带来 iGame RTX 50 系列显卡相关福利，使主舞台区成为整个展台中最热闹的区域之一。 8、iGame 愿望商店 iGame 愿望商店区承担了本次七彩虹展台中的“福利中枢”角色。玩家可通过参与不同区域的打卡活动，集齐五大区域徽章，并在该区域兑换专属好礼。 此外，愿望商店还设置了抽奖核销和限定发售环节。玩家有机会抢先购买每日限量发售的 RTX 50 系旗舰显卡、热门 IP 周边和全新音频设备。配合展会专属折扣与秒杀福利，该区域也成为不少硬核玩家补充装备和获取限定周边的重要位置。 结语 整体来看，本届 BW 2026 上，七彩虹围绕“热 i 一夏，玩创星球”主题，完成了一次覆盖游戏性能、AI PC、本地创作、DIY 硬件、原创 IP 与潮流互动的全景式展示。 从 iGame GeForce RTX 50 系显卡、DLSS 4.5 游戏体验、NVIDIA Reflex 低延迟竞技体验，到 iGame LAB Vulcan Armor 火神战甲、RTX AI PC 本地创作演示，再到橘猫、隐姬、柒小希等原创 IP 的场景化落地，七彩虹正在尝试让 PC 硬件从单一性能产品，进一步延展为年轻用户表达兴趣、审美和生活方式的载体。 七彩虹也表示，未来将继续围绕 iGame 品牌内核，深耕技术研发与用户体验，并通过更完整的 PC 产品生态和更具温度的品牌表达，持续服务玩家、创作者和年轻消费群体。",

      "summary": "LV 最近，广西一场洪水，又双叒叕让不少品牌登上热搜。 在一众的品牌捐款名单里，除了常见的消费巨头互联网大厂之外，人们还看到了一个新面孔，那就是茉莉奶白。 茉莉奶白 有人说，“自己淋雨，还想着给别人撑伞”。毕竟前不久，茉莉奶白自己还相当焦头烂额。 本来好好卖20块一杯茶饮，突然被一个卖3万包的顶级大牌闹到跟法庭相见，理由是杯子上的四叶草“近似”。网友一句话总结到位： LV跌倒，茉莉奶白吃饱。 LV跌倒，茉莉奶白吃饱。 这话没毛病。毕竟，从现实看茉莉奶白确实输了，苏州中院一审判下来，茉莉奶白赔LV1030万，千万赔偿，创下新茶饮商标侵权判赔纪录。 然而这一次，热搜上的舆论却并没有站在赢家这边。 有网友发现自家砖墙四叶花纹跟LV老花像，“好怕LV告我家房子”。还有网友翻出各种类似LV花样的东西：公厕装饰、墙砖甚至还有人民币等等，表示还好LV没看见。 砖墙四叶花纹 连官媒都发出灵魂拷问，“老祖宗留下的东西，我们自己反倒不能用了吗？应该探索建立中华民族传统美学数据库。” 质疑归质疑，然而这些都不能挡着LV“大杀特杀”。茉莉奶白不是第一个，有人扒出了LV这些年的战绩，光是近五年，侵害商标权的风险信息一共1691条，2024年单年207起，2026年刚过半已经56起。 如此多的法庭见，已经不是维权两个字能简单解释的了。还有人调侃说，LV在中国的法务部，比设计部还忙。 “告完你的告你的”LV，从这几年的现实来看，不像维权，更像维生。 5年打上千场官司：茶饮、餐厅、酒...... 这些年的LV，已经不再是过去那个“不谙人间烟火气”的LV了。 能一己之力打破奢侈品高冷结界告小微企业，还是因为早就尝到过甜头。 最开始，它的矛头还是对准不出名的素人草根。 几年前，南京一家做中古风的餐吧，因为吧台装饰和蛋糕包装上用了点花卉图案，当时还特意改过一轮怕侵权。 中古风餐吧 结果LV还是虽迟但到，一上来就要索赔120万。 今年3月判LV胜了，认定侵权赔6万维权开支2万，合计11万。听着不多，可这家店已经亏了200多万倒闭。 当然，LV的维权之路还远没到尽头，胆子也是越来越大，开始盯上一些有头有脸的品牌或公司。 这些年，卖葡萄酒的贸易公司、回味鸭血粉丝汤、酒吧……都不幸踩中雷区，被LV告了个遍。 那些街边小店、个体户，主打一个公平对待，只要logo视觉元素有近似可能，一律纳入射程。 很多人不知道，连向太都进了LV的维权名单。 这几天，向太自己爆料，早年拍张柏芝《天生购物狂》，剧组场景里用了点花叶纹道具，LV律师函直接寄到她桌上准备起诉。 然而这一次，屡战屡胜的LV却罕见踢到铁板上了。 不像一般默默忍受的商家，向太不会惯着，而是直接找对方高层硬刚，LV无奈只能撤诉。 同样硬刚LV的还有周大福。在茉莉奶白侵权风波几天后，网友发现周大福在LV店附近开了一个原创老花装饰展，摆出1300年前的宝相花，被网友称“贴脸开大LV”。 周大福 再到茉莉奶白，更是一夜激起民愤纷纷指责LV，人们彻底不忍了，甚至要把LV跟“公厕”扯上关系。 法理全赢，舆论全输，这是LV这波维权最魔幻的地方。 其实，网友不是不懂商标法。大家意难平的是，浓眉大眼的LV，赖以维权的那个四叶花卉老花，往上追是隋唐的宝相花，再往上是新石器时代的柿蒂纹，唐代紫檀琵琶上就有。 宝相花 这是中国老祖宗的审美，但现在却变成了LV借鉴中国的传统纹样，二次设计抢先注册，最后反过来告国内企业。 说穿了，这轮维权狂欢根本不是冲商标擦边去的，是冲能赔钱的人去的。 正如网友说的： “过去LV打假还有体面。现在LV打官司，更像是急了。” LV百年护城河，对年轻人不好用了 为何LV这些年开始频繁维权，被网友调侃成“告完你的告你的”？ 根源还是因为——日子不好过了。 从这些年LV的发展来看，如果被侵权是逃不开的烦恼，那么产品就是它一块更长期的心病。 就拿一点来说，最早LV卖的不是包，是欧洲老钱的生活方式。曾经从明星到普通人，LV的老花花纹几乎就是拉风神器。 LV 出门背LV，路人会觉得你有钱。但现在背，别人未必会多看一眼。 人们对品牌高高在上的认知开始松动，这对于大牌无疑是暴击。为了挽尊，LV自己动了两刀，然而从现实看，刀刀都砍了个寂寞。 第一招涨价，却在年轻人面前吃瘪了。 很多奢侈品大牌为了自救的王炸，就是涨价。 毕竟，涨价后很容易换来门店排队。消费者的逻辑是晚买更贵，买涨不买跌，所以越涨价越被疯抢。 所以，LV在2025年4月曾启动涨价策略，普通手袋涨600元，经典款涨超1000元。 LV 然而LV没想到的是，如今的年轻人对这套打法彻底不认了。 2025年LV全年营收808亿欧元，同比降5%；净利润108亿欧元，一口气滑13%。LV 所在的时装皮具部门，2025年营收377.7亿欧元，连续两年跌了8%。 去年二季度更是交出30年来最差单季成绩单，管理层自己都承认失速的导火索在中国。 为什么年轻人不买账了？答案是： 拒绝无理由溢价。 大牌本来就很贵，更尴尬的是，产品公价年年涨，流通价却悄悄在往下滑。年轻人现在买包前先查红布林、只二二手平台，早买早赚的理财神话不复存在，所以很多人并不接受简单粗暴的涨价。 同时，一些国潮原创包，质感逼格不输大牌，设计也更懂中国人。年轻人想的很明白，为一个logo标花一两万，不如拿一两千支持国货。 LV 第二招开店更扎心，反让看家本事被小弟们截胡。 在年轻人这里吃了瘪，按理来说，LV还有忠诚的中年中产粉丝。 这些人更有钱，也不会随便因为价格涨跌改变自己的习惯。但现在，他们的新宠也是越来越多。 这些年，隔壁Celine、Miu Miu等后浪靠年轻化设计，吃掉了原本属于LV的预算，连Coach在2025年Q1同店同比涨15%，接的就是抛弃传统大牌的中产。 LV 为什么中产也开始倒戈了？在这背后，可以说，是LV少了他们最看重的护城河——稀缺感。 很多人不知道，LV过去几年，门店大开特开，从一线铺到三四线，贵阳、昆明机场全铺上，更早的时候是把招牌挂进了无数非核心城市，老花满大街都是。 社媒评论 正如奢侈品专家周婷一针见血，当用户从咬咬牙也难买到，变成随处可见够得着，大牌的光环就没了。 价格敏感的年轻人嫌贵，中产在乎的稀缺感也在减弱，LV只能把委屈往肚子里咽。 LV跌下神坛，背后是时代变了 正主告山寨，这些年已经屡见不鲜。 过去，很多人往往会站在正主这边怒斥山寨者，但现在越来越多的人反过来，开始为被告者鸣不平。 就像不久前，河南南阳一家卖8块钱一碗豌杂面的夫妻店渝见小面，因为商标问题被巨头遇见小面告上法庭，舆论却相当的一边倒，最后遇见小面也取消了诉讼。 渝见小面 没想到遇见小面好不容易平息下去的争议，后脚LV也陷进去了。 说到底，商标是护城河，不是摇钱树。甚至这一告，吃相难看是其次，反而更加暴露软肋。 为什么现在的人，如此反感大牌维权了？ 第一，是LV在中国维权的那套，外国并不好使。 很多人不知道，LV在中国成功维权背后，在国外无一例外都是碰壁。 在老家法国，以及日本意大利美国，凡是涉及“老花、四叶草”这种案子，基本是全输。 比如在2023年，LV告自家法国老乡Zadig&Voltaire，打了两年依然最后被巴黎法院判输，甚至还反手判LV要交3万欧诉讼费。好家伙，原来LV在国内告赢的，全是国外告输的？ LV 但从茉莉奶白这一次的舆论反噬能看出，中国消费者有了文化自信，不会再任由LV继续为所欲为。 尤其是告到停业餐吧与小微商户，这画风就更不对了，不像是捍卫品牌，更像是一种创收。这也是为什么网友观感不佳，品牌官号持续掉粉，更有不少消费者表态要“脱粉”。 第二也是最致命的，LV自己也没新故事了。 其实这些年，比起维权，LV拿不出过硬的产品才是原罪。 自从2022年，在CarryAll之后再无现象级爆款，2026年搞个洒水壶包，��被嘲博眼球，也没掀起什么水花。 一个数据很扎心，在LV皮具业务里，经典“老花”系列依然占超六成营收，还是公司的摇钱树。 纵观同行，爱马仕用手表系列给自家业绩回血，Miu Miu也推出新的保龄球包一度刷屏，年轻女生依然买账。 话说回来，LV维权的利器“老花”，从现实来看，与其说是它的护城河，更像是它的束缚。 LV 这些年无数品牌的相似老花设计，再加上太多山寨包的出现，人们对其早已经视觉疲劳了。 一个老花显然不能吃遍天，成也老花，败也老花，LV不能再在“老花”的老本上躺赚，更不能妄想改个配色就让用户乖乖为涨价买单。 就像LV掌门人阿尔诺自己曾承认，“2026年不会太轻松”，如果不虚心听取中国用户的反馈，接下来的日子只能更艰难。 LV掌门人阿尔诺 总之，想要真正度过危机，LV接下来的重心绝不是维权或刷脸。 放下套路好好做产品，才是得人心的杀手锏。 向外攻击只能弄丢粉丝，向内防守才能赢得路人。 图片来源于网络，侵权请联系删除 本文来自微信公众号 “金错刀” ，作者：江源，36氪经授权发布。",

      "summary": "IT之家 7 月 12 日消息，据楚能汽车技术研发中心分享，7 月 11 日，楚能汽车首台 ET 车下线仪式在研究院试制中心总装车间举行， 标志着楚能汽车首发车型正式从工程数据阶段迈入实车验证阶段 。 IT之家注：ET 车指 Engineering Trial 阶段，即工程调试 —— 设计验证阶段，就设计、制造、装配各环节过程进行综合确认，主要是验证工艺、工装。同步进行全工装件台架性能试验、台架耐久性试验、整车试验以及内外装饰件颜色纹理认可。 据介绍，楚能汽车技术研发中心柔性数字化试制产线， 配备七轴高精 KUKA 焊接机器人、自动化总装合拼夹具等高节拍智能装备 ，具备多车型混线高精度焊装、整车装配与多维度下线检测一体化能力，完整覆盖白车身制造、整车装配、实车下线验证全流程。 本次下线的 ET 车将用于整车性能验证、制造工艺验证、质量校验等任务，覆盖电子架构、三电、智能座舱、智能驾驶、底盘、热管理等核心系统验证开发，为量产车型性能验证与工艺优化提供支撑。 另据IT之家此前报道， 早在去年 6 月就有爆料称湖北楚能新能源已涉足整车制造领域 ，汽车业务部门已有百人规模。这家公司坐拥 110GWh 的电池产能，背后站着全国前五的经销商集团，有 300 余家 4S 店，董事长还是堪比段永平的“超级牛散”，供应链、渠道、资金一应俱全。 有接触到此项目的人士说：“第一款车可能会瞄准问界 M5，做增程 SUV，长期车型规划里增程和纯电都有。” 相关阅读： 《 消息称电池公司楚能新能源着手造车：背靠 300 余家 4S 店，第一款车可能瞄准问界 M5 》",

      "summary": "IT之家 7 月 12 日消息，中国载人航天办公室今日更新“天宫 TV”，神舟二十三号乘组已经“太空出差”近 50 天，航天员在空间生命科学与人体研究领域开展了多项实验，并同步开展了组合体照料与健康管理。 IT之家从视频获悉，刚刚过去的一周，神舟二十三号乘组“在轨实验清单”不断更新，在空间生命科学与人体研究领域实验里，航天员两两配合， 开展“多人协作界面实验” 。围绕运动骨肌受力研究项目，乘组进行了足底压力测量、下肢运动生物力学测试以及肌肉肌腱特征测量。 通过采集飞行中不同负荷状态下跑步、抗阻运动的足底压力、关节运动学数据和运动图像、相关肌肉参数，获取映射关系及肌肉、肌腱相互作用的变化特征。 此外，乘组使用近红外脑功能成像设备开展了多任务范式的神经人因研究相关实验。地面科研人员将利用在轨采集数据， 开展太空环境对航天员认知控制的影响规律等 。 在空间微重力物理科学领域，乘组更换了燃烧科学实验柜气体实验插件的内部燃烧器、流体物理实验柜内样品和在线维修装调操作柜内实验样品。 乘组还完成了两相系统实验柜“多场效应蒸发模块”安装，无容器柜实验腔体样品清理，轴心机构电极维护、视窗盖镜片清洁等工作。 在空间站组合体平台照料方面，乘组常态化开展再生生保设备检查维护， 对眼部冲洗装置、静脉输液装置等乘员设备进行维护 ，并对首次亮相空间站的改进型在轨质量测量仪进行测试。在繁忙的任务之余，三名航天员持续进行在轨锻炼，并使用相关设备积极对抗失重生理效应。",

      "category": "芯片",
      "title": "腾讯重仓一个IPO",
      "summary": "图片来源：视觉中国 作者/杨继云 报道/投资界PEdaily 深圳超级IPO来了。 日前，深圳云豹智能股份有限公司（简称“云豹智能”）创业板IPO申请正式获深交所受理，成为又一家选用创业板第四套上市标准申报上市的企业，冲刺“国产DPU第一股”。 回想6年前，斯坦福博士萧启阳在深圳创办云豹智能，专注于DPU赛道。这个团队启航两个月后，千亿DPU赛道开始爆发。至今，他背后站着腾讯等一支长长的投资人队伍。 腾讯无疑最为重仓，已成为云豹智能最大股东。与广东国资押注的粤芯半导体一起，云豹智能成为大湾区又一标志性的半导体案例。 斯坦福博士，干出深圳独角兽快IPO了 先从创始人萧启阳说起。 他出生于中国香港，早年赴美求学，学术履历极为耀眼：以最高荣誉（Summa Cum Laude）同时毕业于纽约大学（数学和计算机科学学士）和纽约库珀大学（电子工程学士），24岁即获得斯坦福大学电子工程博士学位，此后先后在加州大学尔湾分校、麻省理工学院任教。 博士期间，萧启阳主攻人工智能和神经网络方向。他的一项成果曾破解AI领域三十多年未解的理论难题，受到\"人工智能之父\"Marvin Minsky的高度赞誉并亲自撰写序言。 第一次创业是在2002年，他在硅谷联合创办了芯片公司RMI，后被博通以37亿美元的现金高价并购，震惊业界。 2020年，目睹算力国产替代的机会，萧启阳再次创业。考虑到国内人才和成本优势，这一年8月，他回到深圳创办云豹智能——在很多人还在讨论CPU、GPU的时候，专攻DPU。 说来也巧，不久后，英伟达在GTC大会上正式推出DPU概念，黄仁勋提出\"CPU+DPU+GPU\"的\"三芯\"战略，DPU赛道迅速成为\"兵家必争之地\"。 此后云豹智能快速崛起。自主研发了国内首款高性能、通用可编程DPU SoC芯片，网络带宽达400Gbps，相比传统方案性能提升4倍、功耗降低50%以上。仅用4年时间，就完成了从FPGA验证到6nm SoC量产的全过程。 根据招股书，目前云豹智能能够提供包括弹性网络与存储、虚拟化、安全及低时延RDMA等功能在内的一站式解决方案。 招股书 招股书显示，云豹智能2023年、2024年、2025年营收分别为17万、3635万、3.7亿元；净亏损分别为6.67亿、6亿、11.9亿元；扣非后净亏损分别为6.7亿、6.2亿、5.6亿。尽管2025年营收同比增长超900%，云豹智能依然处于亏损状态。 由此，深圳又一个超级IPO浮现。 VC/PE云集，腾讯成最大股东 芯片创业，无疑是烧钱黑洞。 截至递交招股书前，云豹智能也经历了数轮融资。最早是在2020年底，彼时公司刚注册两个月，就一口气拿下五源资本、正心谷资本、中芯聚源、华业天成、耀途资本、弘卓资本等投资机构加持的种子轮融资。 半年后，云豹智能再次完成阵容豪华的天使轮融资，包括红杉中国、深创投、腾讯、五源资本、华业天成、QBN Capital。萧启阳曾在演讲中提到，“创立云豹智能时，我只有一个人，拿到天使轮之后才敢去请创始团队。” 正是在这一轮中，云豹智能迄今最重要的股东出现——腾讯。这是腾讯首次入局，此后连续重注。 2021年9月，云豹智能完成A轮融资，腾讯再次出手数亿元人民币，其它投资方除了红杉中国、深创投、五源资本等老股东外，还包括淡马锡、蔚来资本、正心谷资本、华西村股份旗下投资平台一村资本、民生银行上市金融控股平台民银资本、耀途资本等等。 至此，云豹智能成为国内DPU独角兽。 随后的融资更是势如破竹——2023年拿下阳光保险、国信资本、润信新观象产业基金等的融资，2024年后政府引导基金进场，深圳市引导基金和宝安区产业投资引导基金B轮融资；2025年，IDG资本、杭州产投、杭实资管、萧山资本等三家杭州国资、鹏鼎控股、云尖信息等产业方悉数进场，老股东参与。 2025年11月底，同创伟业、东方富海、基石资本等几家深圳本土VC一举加持，IDG资本、腾讯再度参与其中。此后估值超过140亿元。 IPO前， 腾讯通过关联主体以19.7792%的持股成为云豹智能的第一大股东 ，而公司实际控制人萧启阳、张学利合计直接持有公司7.1520%的股权，通过云豹创芯、云豹创智两个持股平台间接控制公司22.6588%的表决权。 这也提示了一种风险：腾讯作为第一大股东，未来在二级市场增持或减持都可能对公司控制权稳定性产生影响。 创业板窗口，大湾区开启上市潮 终于轮到深圳了。 过去很长一段时间，深圳在半导体领域的标签更多是“消费电子应用”和“终端制造”。在这一轮AI算力大爆发的浪潮中，围绕国产算力的资本竞赛正全面提速，深圳急需一个能代表底层核心技术的超级IPO。 此前国产GPU的IPO浪潮中，摩尔线程、沐曦、壁仞科技等多集中在北京、上海等地，如今云豹智能冲刺“国产DPU第一股”，恰好为深圳在“基础设施芯片”维度补上了一块重要拼图。 由此望去，大湾区半导体资本化正在形成梯队效应。 不久前，粤芯半导体技术股份有限公司（简称“粤芯半导体”）创业板IPO成功过会，拟募资75亿元。对于投资方来说，这同样是一场漫长押注——八年前，粤芯半导体从广州黄埔的一片空地起步，后来成为粤港澳大湾区第一家实现量产的12英寸晶圆制造企业。 一路走来，在这只广州超级独角兽背后，广东国资几乎贯穿其每一轮融资，寄予沉沉的厚望。 看上去，粤芯半导体代表了大湾区在晶圆制造领域的突破，云豹智能则代表了大湾区在高端芯片设计（DPU）领域的突围。 此刻，他们乘着创业板改革红利的东风。 粤芯半导体选择适用创业板第三套上市标准，是继大普微之后，创业板第二家未盈利过会企业；而今年4月创���板正式启用“第四套上市标准”，看重研发投入和市值，而非短期净利润，此后云豹智能IPO顺利推进。他们都向硬科技企业释放信号——只要技术过硬、研发够高、成长性够强，资本市场的大门已经敞开。 创业板开始热闹。自2024年9月以来，创业板指累计上涨约150%，成为A股最醒目的主线之一；放眼望去，创业板已经成为中国硬科技公司最密集的资本市场样本之一。 这当中，大湾区的硬科技军团已经吹响了突围的号角。 本文来自微信公众号 “投资界” ，作者：杨继云，36氪经授权发布。",

      "id": 75,
      "category": "新产品",
      "title": "消失的150亿美元，有下文了",
      "summary": "这场秘密增持的故事断续延宕了二十余年。 作者 黎曼 2026年7月，奢侈品行业的目光同时聚焦在两个法庭上。 一个是中国法庭。苏州市中级人民法院就LV诉新茶饮品牌茉莉奶白商标侵权案作出一审判决，认定茉莉奶白侵害LV七件四叶花卉图形注册商标专用权，判赔金额合计1030万元。目前该判决尚未生效，茉莉奶白方面已公开回应将依法提起上诉。 了解LV的朋友会知道，茉莉奶白商标侵权案只是LVMH执着于商标维权的冰山一角。从韩国炸鸡店的招牌字体，到美国作坊的老花洗手液瓶，再到荷兰艺术家画布上的一只难民手袋，过去二十年里，只要有人触碰那个老花标识，哪怕只是擦了一点边，LVMH的法务函总会精准送达。业内流传一个说法：LVMH的法务团队规模超过百人，年预算上亿欧元。数字未经证实，但在全球主要法域的商标判例里，LVMH作为原告的出庭频率确实无人能及。 这种对品牌控制的极致追求，LVMH在资本战场上也有所体现。 几乎在同一时期的巴黎法院上，LVMH集团向法庭提交了一份长达20页的答辩文件，首次系统披露本世纪初秘密增持爱马仕股份的完整过程，LVMH曾一度成为爱马仕除了其家族外的第二大股东。 案件的起因是现年83岁的爱马仕第五代继承人尼古拉·皮埃什于2025年提起诉讼，称自身损失估值超过150亿美元（约合1080亿元），LVMH集团及其董事长贝尔纳·阿尔诺均被列为被告。 这场秘密增持的故事断续延宕了二十余年，期间不断有零星报道流出。如今这份答辩文件终于浮出水面，让我们得以从头梳理整场棋局。 股权的裂缝 故事要从爱马仕家族内部的一处裂缝说起。 1993年，爱马仕在巴黎泛欧证券交易所上市。尽管走向公开市场，庞大的爱马仕家族依然保留了74%的股权，分散在200多位家族成员手中，没有一人的持股超过5%。 对于任何想染指爱马仕的人来说，这是一个危险的结构：股份足够分散，但也足够团结。家族成员之间有一个不成文的默契，绝不向外人出售股份。 但总有例外。 尼古拉·皮埃什，爱马仕创始人的第五代后裔，曾任集团董事会成员，一度是集团最大个人股东。他曾在爱马仕做过高管，但没多久就离开了。之后他创立过自己的时装公司，做过滑水教练，最后干脆什么也不干，靠着爱马仕的股份分红生活。 1998年前后，皮埃什从法国移居瑞士，远离了家族的管控。他把自己的资产，包括那笔价值连城的爱马仕股份，全权交给了一位瑞士财富管理人：埃里克·弗雷蒙德。 皮埃什签了一份“自由裁量管理授权”。这意味着，弗雷蒙德可以替他决定什么时候买、什么时候卖，不需要一笔笔过问。 这个签字，后来成了整场风暴的起点。 时间来到2001年，迎来了一场关键会面：弗雷蒙德找到了阿尔诺的亲信皮埃尔·戈德。 根据LVMH在20页文件中的说法，弗雷蒙德提议与皮埃什结成联盟。皮埃什当时因在家族企业中缺乏话语权而感到不满，正寻求在公司治理中发挥更大作用。 LVMH辩称，集团的目标并非收购皮埃什的股份，而是希望与他结成股东联盟，以此影响爱马仕的战略决策，并争取吸引其他家族成员加入。 此后多年里，弗雷蒙德与皮埃什曾多次和阿尔诺、戈德会面，地点包括LVMH旗下波尔多滴金酒庄。弗雷蒙德还与爱马仕家族的其他成员建立了密切联系。 真正让事态升级的，是2007年。那一年，弗雷蒙德告知LVMH集团，有大量爱马仕股票即将流入市场，并威胁称除非集团迅速出手，否则他会将这些股票卖给其他竞争对手。LVMH表示，正是这一警告促使集团搭建了股权互换合约结构，开始秘密建仓。 股票掉期是一种金融衍生品。简单来说，LVMH没有直接在二级市场买入爱马仕股票，那样会触发信息披露义务。而是通过与银行对赌，间接获得股价上涨的收益，同时瞒天过海地积累了持仓。从2001年到2002年，LVMH通过子公司收购了爱马仕4.9%的股份。2007年，LVMH恢复增持，通过金融中介和子公司购买股权衍生品，每一笔持仓都控制在5%以下，以规避信息披露义务。 这套操作，让阿尔诺在爱马仕家族的视线之外，悄无声息地布下了一张网。 2010年10月24日，炸弹引爆了。那是周三的早晨，爱马仕时任CEO帕特里克·托马斯接到了阿尔诺的来电。他告诉托马斯，LVMH集团已经通过现金结算的股权互换，购得了爱马仕14.2%的股份，算上已持有的可换股衍生工具，总持股量达到17.1%，一举成为爱马仕除家族之外的第二大股东。 随后，阿尔诺公开宣布了这笔持仓，整个奢侈品行业为之震动。 爱马仕家族的愤怒可想而知。一个竞品，在家族毫不知情的情况下，已经摸到了家门口。更可怕的是，阿尔诺的胃口远不止于此。到2012年12月31日，LVMH的持股比例进一步攀升至22.6%。 爱马仕家族闻讯后迅速行动。2011年，家族成员将大部分个人所持股份集中起来，成立控股公司，将超过半数股份锁定，以防被收购。这是一场反击，家族用团结筑起了一道墙，把门口的“野蛮人”挡在了外面。 皮埃什呢？他没有加入家族控股，而是保留了个人持股。外人以为这是彰显个性，但后来的事态证明，那可能正是他遭遇“资本渗透”的一个致命的漏洞。 双方的官司打了一年。最终，法国金融市场监管机构认定LVMH集团未及时披露建仓行为，并作出处罚。2014年，双方达成和解：LVMH承诺不再增持，并将持有的爱马仕股份全部转让给LVMH的股东。法国司法也在2015年对相关纠纷作出“不予起诉”裁定。据市场测算，这笔投资最终为LVMH带来了约38亿欧元投资收益。 故事似乎到此结束。 150亿美元，凭空消失了 真正的炸弹，埋在十几年后。 2022年夏天，皮埃什把弗雷蒙德叫到家里，问了一句话：“我之前叫你给园丁家转100万瑞士法郎，你转得怎样了？” 这位园丁在皮埃什家工作多年，与妻子一同照料皮埃什的日常起居。皮埃什晚年无子女，园丁夫妇是他生活中最亲近的人之一。出于信任与回报，皮埃什曾委托弗雷蒙德从自己的账户中转出一笔钱给园丁一家。 弗雷蒙德支支吾吾。一旁的园丁妻子听出了不对劲，事后告诉皮埃什：“我们根本就没有收到过什么转账。”皮埃什感觉不对，聘请了法律团队和咨询公司，对自己的财务状况做了全面审查。 这一查，天塌了。账户早就空空如也。其中90%的爱马仕股份，早在2008年就被转卖了。600万股爱马仕股份，按巴黎司法法院的估计，价值约150亿美元。皮埃什的财富，在他毫不知情的情况下，蒸发了。 2023年9月，皮埃什在瑞士对弗雷蒙德提起三起诉讼。瑞士法院2024年判定皮埃什自愿委托且无证据支持欺诈指控。 无果后，皮埃什没有放弃。2025年，皮埃什再度正式向巴黎法院提起民事诉讼，将LVMH集团、董事长阿尔诺、阿尔诺家族控股公司以及已故的理财师弗雷蒙德列为共同被告。他称自己名下价值约150亿美元的600万股爱马仕股份，被长期信任的财务顾问以秘密手段转手给了LVMH。 更耐人寻味的是，弗雷蒙德在起诉两个月后，于2025年7月死亡。就在法国检方对他展开“背信和资产挪用”刑事调查期间，他在瑞士结束了自己的生命。案件最关键的证人，就这样消失了。 巴黎检方已启动调查，并于近期宣布对三名律师展开正式调查，其中一名律师曾在十余年前LVMH集团大举收购爱马仕股票期间为该集团提供服务。5月18日，一名瑞士律师因涉嫌严重背信罪共犯、窝藏背信所得等罪名接受正式调查。5月27日，另一名律师因涉嫌在2001年至2014年间参与挪用皮埃什的爱马仕股份至LVMH而接受调查。目前三名律师均否认存在不当行为。 LVMH最近开始了反击，也就有了开头所说的，LVMH向巴黎法院提交了一份长达20页的答辩文件。 这是LVMH首次公开回应这场纠纷。文件的核心论点是：LVMH是被无端卷入的。皮埃什之所以将阿尔诺与LVMH牵扯进案件，完全是因为后二者有能力支付巨额赔偿，而弗雷蒙德的遗产及其名下公司不具备相应偿付能力。 “如果皮埃什未收到出售其股票的款项，那是他与弗雷蒙德之间的纠纷，与LVMH集团无关。” LVMH坚称，对任何涉嫌挪用资产的行为“完全不知情”。集团始终认为交易属于正常资本合作，从未获知弗雷蒙德存在任何侵占客户资产的行为。 但调查人员发现了一条关键线索：皮埃什持有的约6%爱马仕股份中，有很大一部分当时正是通过与LVMH的股票掉期交易，转入法国兴业银行的。调查人员正在核实，参与交易的人员中，是否有人明知流入LVMH秘密持仓的这些股票，是在所有者不知情的情况下被转让的。 对此，皮埃什的律师回应称，目前所有责任认定仍需等待法国刑事调查结果，在调查结束之前，没有任何一方能够排除嫌疑。 2010年的那场收购战，LVMH输了。爱马仕家族用团结守住了控制权。但15年后，阿尔诺的名字再次出现在爱马仕股权纠纷的被告席上。这一次的金额更大，案情也更扑朔迷离。 在爱马仕的世界里，一只手袋可以等待数年。一笔股权，却能消失二十多年。究竟是谁拿走了它？而那位最关键的证人，弗雷蒙德，已经无法开口了。 为防止类似皮埃什的财富蒸发事件再次发生，爱马仕家族于2022年成立了统一的家族办公室Krefeld。其由八个独立的家族办公室和投资工具整合而成，汇聚了爱马仕家族不同分支的财富。其管理文件将所有权严格限制为家族第三代埃米尔-莫里斯·爱马仕的后代。 据悉，Krefeld直到2024年才开始正式运行，目前投资了法国保险公司Albingia，还和KKR一起入股了健康美容集团Anjac Health & Beauty。 据彭博亿万富翁指数，掌控爱马仕财富的逾100名家族继承人合计净资产达1860亿美元，是欧洲最富有的家族之一。 本文来自微信公众号 “投中网” ，作者：黎曼，36氪经授权发布。",

      "title": "1X 发布 Neo 机器人机械手：25 个自由度，有触觉，可水洗",
      "summary": "IT之家 7 月 12 日消息，总部位于美国加州帕罗奥图的 AI 机器人公司 1X 近期向外界展示了公司最新研发的人形机器人 Neo 的机械手视频，其表现可以说令人震撼 —— 动作速度极快、控制精准，达到了前所未有的水平。 Neo 机械手最引人注目的参数，是拥有 25 个自由度（Degrees of Freedom），并且全部采用主动驱动（即每个关节都由电机独立控制），同时采用仿生肌腱（Tendon-driven）驱动结构。1X 表示，这套设计让 Neo 的灵巧性、力量和可靠性已经接近人类双手。 不过，这只是其亮点的一部分。这双机械手还具备可反向驱动（Backdrivable）特性，手指内置触觉传感器，既能轻松举起一只约 20 磅（IT之家注：约 9.1 千克）的壶铃，又能完成极其精细的动作，例如摘下一颗葡萄、安装灯泡，甚至从地板上捡起一颗螺丝。 大多数机器人“没有触觉”，Neo 不一样 目前，大多数机器人的机械手几乎都属于“只写不读（Write-only）”。也就是说，你向机械手发出动作指令，它会执行到指定位置，但整个过程中不会反馈任何触觉信息。它无法像人类一样“感觉”自己接触到了什么。 造成这一问题的主要原因，在于传统机器人通常采用 100:1、200:1 等高减速比齿轮机构。这种设计虽然能提高输出扭矩，但几乎会把所有接触力反馈都“吞掉”，无法传递回电机，因此机械手实际上相当于“失去知觉”。 Neo 则采用了截然不同的方案。它使用仿生肌腱驱动结构，减速比仅约 5:1 至 15:1。因此，每一个关节不仅是执行动作的电机，同时也是一枚力传感器。 如果你按压它的手指，它会自然让位（即可反向驱动），同时还能精确测量你施加了多大的力量。1X 将这一能力称为“力透明（Force Transparency）”。 简单来说，就是力量能够顺畅传递到外界，同时外界施加的力量也能够实时反馈回来，因此机器人能够真正“知道”自己的指尖正在发生什么。 这一点意义重大。因为人类学习如何操作陌生物体，本质上就是依赖这种能力。我们会去摸、按、旋转、摇晃物体，相当于不断用手指提出问题：“它有多硬？有多重？表面是什么质感？” 而这些答案，也正是通过同一双手反馈回来。如今，Neo 已经开始具备类似的能力。 不只是机械手，还有“会感知”的皮肤 Neo 的机械手并不是普通机器人那种坚硬的机械爪，它的手指外层覆盖了一层能够工作的“皮肤”。指尖集成了高分辨率触觉传感器，可实时检测压力大小、接触位置以及剪切力（Shear Force），也就是物体即将滑脱时产生的横向受力。 这意味着，当抓握物体开始滑动时，Neo 理论上能够第一时间“感觉到”，并立即重新调整握力，就像人类一样。 更重要的是，这双机械手还有一个目前极具特色的能力 —— 可以直接水洗。换句话说，Neo 可以自己洗手。它的机械手达到 IP68 防护等级，和如今很多智能手机一样，可以直接浸入水中而不会损坏。 这意味着什么？如果你让 Neo 煎鸡蛋，或者切西红柿、胡萝卜准备晚餐，它完成工作后还能自己清洗双手。又比如，它帮你的孩子制作花生酱三明治，不小心把花生酱沾到了手指上（这种情况几乎难以避免），那么它完全可以自己把手洗干净，而不会把花生酱蹭得到处都是，比如家具、衣服或床单。 据悉，目前还没有其他机器人能够做到自己洗手。 耐用性方面，这套机械手同样表现出色。1X 表示，其机械手已经完成了数百万次测试循环，其中手腕关节在负载条件下已累计完成超过 200 万次运动测试。 为什么机械手如此重要？ 在这次发布中，1X 提出了一个观点：机器人双腿负责移动，身体负责容纳电池和计算平台，而真正完成工作的，其实一直都是双手。折叠衣物、整理洗好的衣服、吸尘、做饭…… 无论是什么家务，最终都离不开机械手。 从某种意义上说，机器人的整个身体，不过就是把双手送到需要工作的地方。 值得注意的是，Neo 的硬件能力目前甚至领先于软件。据悉，Neo 上市时搭载的硬件，其实比现阶段 AI 能够充分利用的能力还要更强。 也就是说，现在是硬件领先软件。随着未来持续通过 OTA（无线更新）升级 AI，Neo 将不断变得更加聪明，也能逐步解锁更多硬件能力。 优秀的机械手，是打造优秀人形机器人的关键，因此整个行业都在展开激烈竞争。例如，Genesis AI 最近结束隐身开发阶段，发布了旗下人形机器人 Eno 所搭载的新型机械手，表现同样令人印象深刻。而专门研发机械手、并不制造整机的 Kyber Labs，也推出了性能非常出色的产品。 加拿大温哥华人形机器人公司 Sanctuary AI 创始人 Geordie Rose 曾经说过一句话：“机器人一半的复杂性，都集中在双手。” 电机、齿轮、肌腱…… 各种精密结构密密麻麻地集中在双手之中。优秀的机械手不仅要力量充足，还要灵活、耐用、可清洗，并且最好能够无限接近人类双手的能力。 这或许仍然是未来十年都难以完全实现的目标。但看到 1X 发布的这双机械手之后，我们距离这一目标或许已经比此前预想的近得多。 目前，Neo 的主要定位仍然是家庭服务机器人。而在见识了这双机械手之后，“机器人帮你做家务”这件事，已经不再像遥不可及的幻想，而越来越像一个即将成为现实的未来。",

    {
      "id": 84,
      "category": "大模型",
      "title": "全网骂Claude变笨，Anthropic下场揭秘：坑你的不是模型",
      "summary": "换更大的模型就等于更聪明？ 【导读】 换更大的模型就等于更聪明？这可能是Claude Code用户最深的误会。很多人为此一路换到最贵的Fable，近日，Anthropic，亲手澄清了这个误区。 你有没有过这种时刻：Claude Code写代码写砸了，第一反应，就是赶紧换个更强的模型。 但这一招，很多时候并不管用，甚至是在白花钱。 近日，Anthropic官方发了一篇长文专门来讲这件事。 Anthropic官方长文 起因是太多人把Claude Code里的两个选项搞混了： 一个是模型选择（Model），一个是努力度（Effort）。 Anthropic官方长文 过去，大家对这两个选项的理解都很简单：换更大的模型，AI就更聪明；把Effort调高，无非是让AI多想一会儿。 而就在今年3月，这个误会还惹出了一场不小的混乱。 当时，不少开发者发现，手里的Claude Code突然「变笨」了。该读的文件不读，该跑的测试不跑，任务干到一半就撂挑子，反过来问你要更多信息。 于是，GitHub上骂声一片。 最狠的一刀来自AMD的AI负责人Stella Laurenzo。 她在GitHub上翻出6852个会话的日志，实测Claude的思考量比2月之前掉了67%，撂下一句： Claude已经没法被信任，去干复杂的工程活了。 Claude已经没法被信任 起初，大家还以为是自己的提示词没写好，或者哪里配置错了。折腾半天才恍然大悟：问题根本不在自己身上，是Anthropic悄悄改了一个设置。 3月4日，为了压低延迟，他们把Claude Code里的Effort选项，默认档位从high降到了medium。 官方更新日志里也写了，可大多数人并没注意到，他们只是感觉到，手里的模型无缘无故好像变蠢了。 扛了一个月，Anthropic才在4月7日把默认档位调回去，还给所有订阅用户重置了一次用量额度。 而多数人这时才知道，这个开关一直就在自己手边，它在暗中决定着：AI到底肯不肯为你满血干活。 Model换的是脑子，Effort换的是态度 Anthropic官方的拆解，可以简单总结为这样一句话： Model换的是脑子，Effort换的是态度。 先说Model，它换的是脑子。 每个模型背后是一套「冻结的权重」，它的能力和知识，在训练结束那一刻就被焊死了：只读、不可改。 这意味着，你推理时喂进去的提示词、CLAUDE.md、贴进上下文的代码，全都改变不了它的这套权重：你可以引导它，却没法「训练」它。 换模型，本质就是换一整套权重来接你的活，所以它解决的是「会不会」的问题。 一个在模型训练时还不存在的库，你把文档整篇喂给它，它能现学现用，可那只对这一次请求管用，模型本身一个字都没记住，转头就忘。 它偶尔会一本正经地调用一个根本不存在的API，也是同一个道理。那并非查漏了，是权重照着训练里的老套路，硬拼出一串东西。 再往底层看一眼，就更清楚了。你写的const x = await fetch，在模型眼里先被切成一个个token，每个换成词表里的一个数字。 图源：Anthropic官方博文 你写的一行代码，被切成token后各自对应词表里的一个整数：const是1078，await是2597，词表约10万个。模型拿到的从来不是文字，是这串数字。 模型不是一口气吐出整段答案的。它一次只预测一个token，接上去，再把整串重新算一遍，预测下一个。一段两百个token的回复，就是两百次完整的运算。 你等的时间、你烧的钱，大头全在这个循环里。 再说Effort，更换的是「态度」。 很多人以为高Effort就是「多想几秒」，错了。 它管的是Claude在这次任务上到底投入多少工作量：读几个文件、跑不跑测试、要不要额外验证、要不要把一个多步骤任务一路推到底再回来找你。 说白了：低Effort的Claude，倾向于快速回复，然后反过来问你要更多上下文，能不动手就不动手；高Effort的Claude，倾向于自己去翻信息、多调几次工具、一口气把长任务链跑完。 Effort在Claude Code里分成好几档，别把它当成一条死板的token预算线。 它是个行为信号，告诉Claude这活得干到多彻底、多有把握才算完，文本回复、工具调用、扩展思考，全在它的管辖范围里。 官方还放了一张示意图：同一条prompt，高Effort能比低Effort多吐大约7倍的token。多出来的那些，全花在读文件、跑验证、反复确认上了。 图源：Anthropic官方博文 同一条prompt，高Effort路径生成的token约为低Effort的7倍，多出的全花在读文件、跑验证、反复确认上。 这里藏着一个反直觉的结论：小模型开高Effort，完全可能干翻大模型开低Effort。 不会，还是不够努力 知道了分工，真正有用的，是官方给的那套判断框架。 图源：Anthropic官方博文 官方判断框架：Claude做错了，先问它是不够聪明还是不够努力，再决定换模型还是加Effort。 Claude干砸了，先别急着动模型选项。 第一步永远是回头查上下文：prompt说清楚了吗？该给的工具给了吗？CLAUDE.md配对了吗？大多数所谓「AI变笨」，根子都在这儿，不在模型选项上。 上下文确实没问题、它还是错，就问自己一句：它是不会，还是不够努力？ 「不够努力」，很好判断：该读的文件跳过了、测试没跑、重构干到一半跑回来问你：它缺的不是脑子，是投入。 这是Effort的事，可以往上调一档。 如果「不会」，则是另一种情形：你上下文给足了，它也明显尽力了，可还是错，换个说法再试一遍还是错。 这时候任你怎么加Effort都白搭，这是模型的事：就要换更强的。 官方还打了个特别好懂的比方。 Sonnet，是个有一整个下午的全能选手。 它会把你的代码从头读到尾，跑一遍、再验一遍，最后是真把你这摊活儿吃透了。 Opus，是只给你五分钟的专家。它带来的是你代码库里压根没有的经验，见过的坑、该绕的雷，全是解过一堆同类问题攒下的直觉。可五分钟就那么点时间，只够它扫一眼，不能扫遍所有文件。 Fable，是所有人都卡住了才请得动的专科。哪怕只给五分钟，它也能一眼揪出别人谁都没看出的那处毛病。 当然，这位专家每个token也最贵，得留给真正没人能接的硬骨头。 所以才有那个反常识的结论： 一个Sonnet开高Effort，在不少活儿上真能干过Opus开低Effort。小模型配上充足上下文和高投入，能扛下的事比你想象的要多得多。 图源：Anthropic官方博文 长任务、多步骤活上，Fable拉开最大差距，官方测试里有些任务Opus和Sonnet开到任何Effort都够不着。 卷完模型排行榜，给AI派活成了硬手艺 这篇官方解读，表面上是教你调参，背后是一个重要的转向： AI编程的竞争，正在从「谁的模型更强」，转向「谁更会调度智能体」。 过去很简单，人挑一个最强的模型，剩下的全交给它。 现在不一样了。你得像个项目经理那样，给不同的模型派不同的角色、定不同的投入档位： 简单的改动交给Sonnet挂低档，秒回还省钱；大型重构上强模型加高档；要长时间自己跑的智能体任务，强模型配足Effort。 这些操作，不仅能把活干得更好，省下来的，都是真金白银的token账单。 Claude Code的Effort菜单里多出的那档ultracode，就是把这套「调度」做进了产品。 选中它，Claude拿到的是xhigh的火力，外加一项授权：遇到实质性的活儿，自己掂量要不要拉起一支智能体队伍，把任务拆下去并行干。 回头看3月那场「变笨」风波。 它能惊动整个社区，恰恰因为大多数人还停在「换模型」的老思路里，对手边这个更要命���Effort选项浑然不觉。 只看模型排行的时代正在过去，调度模型，正在成为核心手艺。 谁先学会给AI派活，谁就能抢先一步，用上那个真正肯为你卖力的Claude。否则，你手里再贵的模型，也只是一个更贵的搜索框。 这样，你烧的每一分token，才算真花在了刀刃上。 参考资料： https://claude.com/blog/claude-model-and-effort-level-in-claude-code https://x.com/ClaudeDevs/status/2074900291062034618?s=20 https://platform.claude.com/docs/en/managed-agents/multi-agent 编辑：元宇 本文来自微信公众号 “新智元” ，作者：ASI启示录，36氪经授权发布。",

      "title": "这个周末，科技投资人都得飞一趟成都",
      "summary": "新能源基金的下半场 作者 | 吕敬之编辑 | 吾人 来源 |&nbsp;融中财经 一只新能源基金落子成都。 近日，成都交通投资集团有限公司、成都濛江投资集团有限公司、杭州碧澄能源发展有限公司、洛能（杭州）股权投资有限公司四方签署新能源产业战略合作协议。根据协议，四方将联合设立总规模10亿元的新能源并购基金，推动碧澄能源西南总部及智能运维、资产运营等专业化经营主体落户成都彭州市，助力当地构建产融协同、全域联动的绿色能源产业发展新格局。 资本市场上的突破和产业落地上的加强，在成都相遇了。这次签约的背后，是新能源资产运营逻辑的一次悄悄转变，也是成都这座城在绿色能源赛道上的一次主动出击。 新能源基金的诞生 近日，成都交通投资集团有限公司、成都濛江投资集团有限公司、杭州碧澄能源发展有限公司、洛能（杭州）股权投资有限公司四方签署新能源产业战略合作协议。根据协议，四方将联合设立总规模10亿元的新能源并购基金，推动碧澄能源西南总部及智能运维、资产运营等专业化经营主体落户成都彭州市，助力当地构建产融协同、全域联动的绿色能源产业发展新格局。 具体来说，四方将集中布局光伏、储能、光储充一体化、城乡微电网等补链强链重点项目，搭建一体化智慧能源调控平台，常态化开展电力现货、绿电、辅助服务等市场化交易业务，形成“项目开发—智能运营—资产资本化增值”完整产业闭环。 在此基础上，各方同步拓展绿色产业金融、能源数字化平台搭建、新能源产业链招商、存量清洁能源资产证券化等配套业务，通过设立专业化资产持有平台，开展新能源项目“投、运、管、退”一体化业务。同时，四方还将立足各自资源禀赋、产业运营、资本平台优势，聚焦补电微网、枢纽微网、园区微网等赛道联合打造示范项目。 本次合作主要围绕着光伏、储能、光储充一体化和城乡微电网这几个方面进行。四方还将建立一个一体化的智慧能源调节平台，并且会一直做下去电力现货、绿色电力交易以及辅助服务等市场化的业务，从而形成从项目开发、智能化运营到资产资本化增值的一体化闭环。闭环听上去很专业，但是拆开来其实很简单，新能源项目建起来只是一步，后面还需要有人来管理、有人来进行运营，最后还要能够变成可以流通的资产，才算是完整的整个价值链。 值得一提的是，在这次签约之前不久，碧澄能源刚刚完成了第一笔分布式清洁能源资产机构间的REITs扩募。这是很容易被人忽视但是很重的一个信号。发行REITs并不稀奇，但是能够在发行之后完成扩募，这就说明了市场对于这类资产的认可度在不断提高，资产运营规模也正在逐步扩大。碧澄能源董事长兼CEO李文轩在签约仪式上表示，公司已经在能源资产证券化、人工智能赋能电力交易和资产数字化运营等方向上取得了重要的进展，并且以新能源资产为主力的投资方向也受到了越来越多的长期资金的关注和认可。 利用当地丰富的应用场景，深入挖掘工商业屋顶资源，探索光储一体化、城市微电网等新模式，并且稳步推进大储项目的实施，在此之下，已经成功完成资产证券化的新能源资产管理平台会把区域深耕的重点放在成都。 对新能源赛道感兴趣的投资人可以多看看这个信号。一个签约就是水面上的部分，而水下则是整个资产运营逻辑、区域布局思路的形成过程。这个周末在成都举行的活动，表面上只是一次普通的产业合作协议签署仪式，但是实际上却是在新能源资本版图上留下的一次重要落子。 为什么是成都 一场合作能不能成，从来不是单方面的事情。 愿意把资源投向一座城市的企业，看重的往往不只是眼前的一纸协议，而是这座城市能不能在后续的产��落地里持续接得住。这一次，成都展现出的接住能力，来自两个层面的叠加，一边是资本端的系统性布局，一边是场景端的真实开放，两者互相补充，缺一不可。 先看资本端。地方国资平台在这类合作里承担的角色，越来越不只是简单的资金方，而是产业基金集群的搭建者。用资本去撬动新能源产业的高质量发展，系统推进微网生态的建设，同时不断扩容智慧能源管控平台的资产规模，提升平台的调度能力和市场化交易运营水平，这一整套动作，本质上是在为新能源资产运营商搭建一个可以长期扎根的资本基础设施。对于像新能源资产运营这类企业来说，电力现货、绿电交易、辅助服务这些市场化能力能不能落地，很大程度上取决于当地是不是已经把这些配套机制搭建成熟。成都在这方面的积累，不是临时起意，而是一整套产业协同思路的自然延伸。 再看场景端，这是另一种更稀缺的资源。资金可以流动，场景却很难复制。工商业屋顶资源丰富，城乡微电网建设的空间充足，具体到街道和厂区的真实应用场景，才是新能源项目能够扎根生长的土壤。愿意把这些场景真正开放出来，用真实的产业需求去吸引产业主体和资本聚集,实现资源互补、业务联动，这种开放意愿，对新能源资产运营商而言,分量往往比资金本身更重。 成都把彭州这样的区域作为西南市场的核心示范支点，背后的逻辑也不难理解。本地应用场景丰富，产业基础扎实，为光储一体化、城市微电网这类创新模式的落地提供了天然的试验田。而放在更大的背景下看，成都这些年在推进国家碳达峰试点城市建设、构建全域协同新型电力系统的过程中，已经积累了相当成熟的产业协同经验，也培养出了主动开放场景的意愿。这种积累不是一朝一夕能形成的，而是这座城市在绿色能源领域长期投入、持续深耕的结果。 一座城市愿意开放真实场景，愿意搭建产业基金集群，愿意升级智慧能源调控平台，这些条件叠加在一起，才会让已经在资产证券化上取得突破的新能源资管企业，愿意把区域深耕的重心放在这里。对于关注区域产业布局的投资人来说,成都展现出的这种承接能力和开放诚意，本身就是一个值得重视的信号，说明这座城市在新能源赛道上，正在从政策洼地，逐渐成长为产业和资本都愿意主动靠近的目的地。 新能源资产正开启一扇新大门 把目光从成都这一个合作中移开，在整个行业的背景之下看去，一个新的值得重视的趋势正在形成之中。 在很长一段时间内，人们对新能源资产的印象就是重资产、慢回报。电站建好了，但是资金被锁在了里面，短期内无法变现出来，这也是以前很多投资者不愿意进入该领域的一个原因。但是REITs等工具的出现，正在慢慢改变着这样的逻辑。资产不是建设完成之后就停止了的过程，而是可以证券化的起点、可以流通的起点、可以退出的起点。如果这条通道打通了的话，那么长期配置新能源资产的意愿就会大大增加起来，因为人们所看到的已经不是只有一项需要长时间持有下去的固定资产了，而是一系列具有明确退出机制并且能够灵活调整的金融产品。 从发行第一只分布式清洁能源资产机构间REITs开始，到完成扩募，整个过程表明市场对于新能源资产证券化接受程度在迅速提高。随着人工智能在电力交易以及资产数字化运营中被越来越多地使用，新能源资产的运行效率与公开性也会得到很大的改善。这样就会有一个直接的结果出现，即原来对这个行业保持观望态度的投资人会重新考虑进入市场的时机。 同时，光储充一体化、城乡微电网等细分场景的逐步成熟也给新能源资产开辟了更多的价值实现途径。以前新能源资产的价值主要依靠卖电来实现，但是现在除了卖电之外，还有储能调峰、绿电交易、辅助服务、资产证券化等等新的价值实现方式在叠加起来，使得整个资产的想象空间变大了。补电微网、枢纽微网、园区微网等概念虽然还比较陌生，但是已经在示范项目的基础上开始规模化的实施，并且成为了新能源资产运营链中必不可少的一个环节。 新能源资产管理行业正处在一次身份上的变化之中。过去它更偏向于工程、运营类的行业，而现在则与资本市场深度融合，并且逐渐形成了既有产业属性又有金融属性的新赛道。这场变革才刚开始，以后会有很多的城市提供出场景和资源，很多的资金会重新去评价这个赛道的价值，也会出现更多的像REITs这样的创新工具来帮助新能源资产找到自己独特的流通途径。 本文来自微信公众号 “融中财经” ，作者：吕敬之，36氪经授权发布。",

      "title": "近百名玩家涌入具身数据 : 一年融资44.7亿，谁能真靠“卖数据”赚钱？",
      "summary": "林方舟 发自 凹非寺 在湖南郴州，一家中国移动营业厅挂牌“具身数据采集5S店”，普通顾客领一套夹爪、手套和头戴相机，经过简单培训，就能边做家务，边采集机器人训练数据。 首期投放的1000套设备，满产状态下每年能采集100万小时数据。我仿佛听到了商家心里打的小算盘：既采了数据，又赚了眼球，4A广告公司都应该来学学。（doge） 具身数采类似的“花活”还有不少：有的为了采数据免费上门保洁（欢迎来我家），有的把数采做成VR游戏，还有的把机器人接入互联网，采集员不用跑到数采工厂，远程就能“云操控”。 具身数采 不过，以上案例看完笑一笑就好了，真要采到符合要求的数据其实并不简单。之所以“花活”层出不穷，都是因为机器人实在是太缺数据了。 眼下大家都在牟足了劲采数据，但还少有人全面梳理过这个行业的图谱。 量子位不完全统计了97家国内具身数据玩家的情况 ，其中70家做数据采集，27家做数据infra。 过去一年（2025年7月1日至2026年7月1日），15家「不做本体、不做模型、只做数据的 独立具身数据服务商 」，共融资约44.7亿元。 在资本对具身智能“猛猛上头”的当下，这个数字其实并不算多。量子位此前统计，今年上半年，具身“大脑派”公司半年就融了223亿元。 为了帮你看清具身数据行业，我们总结了以下十个行业现状。 数据怎么采？ 现状1：数据采集技术路线分为四大类，跨路线采集赛道最拥挤 目前主流具身数据采集的技术路线可以分为四大类： 真机遥操：人类操控真实机器人执行任务，同步采集动作、状态及传感器数据。 无本体采集：人直接完成示范，通过动捕、夹爪映射、第一视角相机等设备采集动作，无需机器人参与。 仿真合成：在虚拟环境中批量生成机器人交互数据，用于模型训练。 互联网视频蒸馏：从互联网视频中提取人类动作知识，转化为具身模型可学习的数据。 量子位不完全统计的70家数采公司/平台中，有30家同时走多条采集路线，占43%，例如：真机遥操+无本体、真机遥操+仿真、无本体+仿真、全路线等。 走跨路线采集方案的玩家，比单独押注任何一条路线的玩家都要多。 行业常用数据金字塔来形容机器人训练所需的数据结构。目前没有任何一种数据采集方式能够独自满足机器人的训练需求。 △ 现状2：单独押注真机遥操路线的玩家最多 依次分析每条技术路线。 单独押注真机遥操路线的最多，有22家，占31%。 这22个玩家中，13家是国资数据平台，7家是机器人公司（生产机器人硬件或开发具身大模型的公司），还有1家从AI数据标注行业转型，1家从工业装备制造领域跨界。 机器人公司有硬件优势和真实需求，做真机遥操采集是自然而然的选择。 而国资数据平台的优势则是“不怕重”。遥操是重资产路线，需要买本体、租场地、雇操作员，这些恰好都是国资平台容易调动的资源。 单独押注无本体采集路线的公司有15家，占21%。 这条赛道的公司最年轻，绝大多数都成立于2024年9月之后。 无本体采集路线的技术也最丰富，子类包括：Ego视角、UMI、动作捕捉、sEMG肌电、触觉采集…… 而单独押注仿真合成的玩家有2家：松应科技和谋先飞（Motphys）。 仿真赛道曾经的知名玩家，如今都选择把鸡蛋放在多个篮子里。 比如，曾以仿真数据为核心的光轮智能，也开始采集人类数据；曾是最坚定的仿真派之一的银河通用，今年6月发布了全身遥操作系统，拥有了遥操数据采集能力。 原因有两方面：外部，真机数据和人类数据的供给快速增加，价格持续下降，仿真数据的规模和成本优势被削薄；内部，sim2real gap仍没有太好的解法，很难高保真还原真实世界中的摩擦、形变、力觉与触觉反馈。 单独押注互联网视频蒸馏路线的也只有1家：枢途科技。 这家公司从互联网单目RGB视频里提取多模态机器人训练数据，宣称能把综合采集成本降到行业平均水平的千分之五。 具身数采 玩家是谁？ 现状3：独立数据服务商已成最大的玩家群体 如果不按技术路线，而是按身份分类，97名玩家可分为5类： 独立数据服务商39家，占40%； 国资数据平台25家，占26%； 机器人公司24家，占25%； 工业和IT跨界公司5家，占5%，例如来自物流、装备制造、自动化工程等领域的公司； 大厂平台型公司4家，占4%，例如华为、京东等。 可以看到， 最大的玩家群体是独立数据服务商。 这说明：具身数据已经成长为一条独立赛道，不再是机器人公司的附属部门。 △ 现状4：三分之二玩家“具身原生”，三分之一玩家“跨界转型” 再换一种分类方式，将所有具身数据行业玩家分为“具身原生”和“跨界转型”两类。 “具身原生”公司成立之初主业就是具身数据或具身智能相关业务；“跨界转型”公司多从AI数据标注、自动驾驶、动作捕捉或工业领域转型而来。 97名玩家中，65家“具身原生”，占67%；32家“跨界转型”，占33%。 再拆开来看，数采公司和数据infra公司的构成完全相反。 70家数采公司里，57家“具身原生”，约占八成；27家数据infra公司里，19家“跨界转型”，约占七成。 为什么infra吸引转型公司，采集行业却多是新玩家？ 很多具身数据infra玩家是AI数据标注公司，例如海天瑞声、数据堂、云测数据等。他们积累的管线、质检和交付能力，很适合平移到具身数据infra环节。 而具身数据没有现成数据，采集环节则要从零构建资产，老玩家没有优势，新公司反而容易轻装上阵。 具身数采 产能与布局 现状5：全行业年产能160万至180万小时，短期目标扩大15到20倍 现有具身数据产能是多少？离市场需求还有多少差距？ 量子位不完全统计，具身数据行业现有年产能为：160万至180万小时+7000万至8000万条。 行业的短期目标为：未来1-3年内，产出2500万至3500万小时+亿条级数据。如果仅看小时数，短期目标是现有产能的15-20倍。 需要注意的是， 由于各家机构披露口径不同，小时数和条数目前没有统一的换算标准，因此在这里并行列出。 这些数字只统计了真机遥操数据和无本体采集数据，剔除了仿真合成数据。产能通过公司/平台已披露的数据保守估计而来，实际数字可能还会更多。 而机器人训练数据的总需求量，目前仍然未知。但可以参考大语言模型的锚点：LLM可以吃掉整个互联网现成的语料，机器人需要的数据却只能一条一条采。有统计称，截至今年初，全球高质量真实物理交互数据总量只有约50万小时，不足LLM训练数据量的两万分之一。 换个角度看，即便产能短期目标全部兑现，相比大语言模型的数据量，可能也只是刚够到起跑线。产能与需求之间仍然存在巨大差距。 具身数采 现状6：全国六成省份建有数采工厂，目前长三角分布最多 这些数据都是在哪里采集的？ 量子位不完全统计，全国的数采工厂已经铺到20个省份，其中国资背景的数采工厂覆盖16个省份。 数采工厂主要分布在长三角、京津冀和珠三角地区。其中，长三角以30座居首。 不少人力成本较低的三、四线城市也成为数采工厂的选址地，例如宿迁、自贡、郴州、运城、德清等。 分布模式和技术路线相关。遥操类数采工厂散布各省，轻资产的无本体路线公司则扎堆在一线城市。 不少城市正在打造数采重镇的城市名片。 例如，无锡是全国首个提出城市全域数据采集概念的城市。它做的最重要的事是：鼓励制造业、服务业企业开放产线、平台，将真实场景作为数据采集厂，采集机器人最稀缺、也最实用的数据。 △ 钱往哪流？ 现状7：15家独立具身数据服务商过去一年融资约44.7亿元 再来看看最能说明问题的指标：钱。 由于机器人公司的数据业务无法从整体融资中剥离，我们圈出 15家过去一年有融资记录的“独立具身数据服务商” ，这些公司的融资情况在行业中很有代表性。 先解释一下，“独立具身数据服务商”的筛选标准有三条：不做通用机器人本体，不训练具身模型，具身数据为核心业务。 量子位不完全统计，过去一年间（2025年7月1日至2026年7月1日），这15家“独立具身数据服务商”共完成34起融资，合计约44.7亿元人民币。 融资的时间段高度集中。 2026年4月至6月三个月内，融资事件数量占了四成多。 这和今年上半年具身智能全行业的资本狂热息息相关。 量子位曾统计，2026年上半年，具身智能全行业共融资约438亿元。 具身数据赛道一年融的钱，只是具身智能全行业半年融资的零头，说明起码在眼下，这个赛道还并不够“性感”。 具身数采 现状8：独立具身数据服务商可划分为3个梯队，分化明显 再往下深扒一层，具身数据行业内部发展并不平衡。 这15家“独立具身数据服务商”可以划分为三个梯队： 第一梯队光轮智能最突出。 这家公司过去一年完成6起融资，共融资31亿元，约占总融资额的七成。 它还是唯一一家披露估值的“独立具身数据服务商”。最新估值超20亿美元，约合人民币超135亿元，是全球首个具身数据独角兽。 第二梯队有11家公司，例如简智机器人、诺亦腾机器人、渊澈太初、觅蜂科技等。 第二梯队的公司，过去一年累计融资在数千万至数亿元间，融资阶段大多为Pre-A 轮及以前，只有几家成立时间较早的AI数据标注转型公司突破了A轮。 第三梯队的公司有3家：枢途科技、智域基石、补天石科技。 他们过去一年的累计融资在数千万元级别，融资轮次为天使轮，业务还处于早期验证阶段。 △ 现状9： 69家投资机构出手，没有一家重仓 从资本的角度看，过去一年，共有69家投资机构投过这15家“独立具身数据服务商”。 出手最多的国方创投，投了3次；出手2次的有5家投资机构；剩下63家机构，都只投了1次。 对照具身模型融资热时头部机构抢占份额、连续加注的景象， 眼下，具身数据赛道虽然方向有共识，但标的还没有共识，没有真正敢重仓的投资机构。 资本的谨慎有理由：相较于想象空间极大的具身“大脑”，具身数据是“劳动力密集型”的生意，价格会越卷越低，客户需求量也有相对明确的预期，天花板就在那里。 但也有投资人告诉量子位，具身数据行业存在一定的延展想象空间：一方面，这是一个全球生意，国外的市场很大；另一方面，数据采集的能力还能迁移到模型评测等，成为物理AI的基础设施。 △ 现状10：半数以上“独立具身数据服务商”成立不到一年 总的来看， 独立的具身数据行业仍处于较早期的阶段。 公司发展处于早期。半数以上近一年融到资的“独立具身数据服务商”成立时间不足一年。 融资处在早期。15家“独立具身数据服务商”中，13家公司的最新轮次在A轮及以前。 商业模式处在早期。没有一家公司披露过利润。仅弈人科技一家自称盈利，但也没公开利润的具体数字。 具身数采 最后，把以上十个现状总结成三句话： 第一句，具身数据行业已经成长为一条独立赛道，吸引大量玩家涌入，并且正在成为AI领域新增就业岗位的蓄水池、地方经济活力的新引擎。 第二句，这条赛道仍然处于早期阶段，许多问题还没解决，许多共识还没形成，许多变量还没收敛。 第三句，资本的态度最诚实。鲜有公司验证过：“纯卖数据”是一门赚钱的生意。VC还在撒网阶段，没人能看清哪条鱼最大。 接下来的一两年，大概率就是这门生意的验证窗口。产能会不会兑现，价格会卷到哪里，谁先把利润表拿出来，决定了具身数据商能否真正成为赚钱的“卖铲人”。 本文来自微信公众号 “量子位” ，作者：关注前沿科技，36氪经授权发布。",

      "title": "独家 | 智谱创始人唐杰发内部信：「GLM 时刻」之后，什么是更重要的事",
      "summary": "文 | 周鑫雨 编辑 | 张雨忻 《智能涌现》独家获悉，2026 年 7 月 11 日，智谱创始人唐杰，在智谱发布了主题为《巨浪已来》的内部信。 过去半年来，智谱收获了创立以来的高光时刻：市值较半年前上市初期涨了 10 倍，并在 2026 年 6 月，跻身“万亿港元俱乐部”——这个数字，是百度市值的近 3 倍，并且超过了小米。7 月 8 日，首批股票解禁后，智谱依然稳住了股价。 这也是当下 AI 大模型赛道，最性感的故事：押注对的技术方向，换来斐然市场口碑和商业化成绩。 抽丝剥茧，智谱起飞的根源，离不开一年前对 Coding 的押注。2025 年初，智谱就开始重新分配资源，将力量收敛到了对模型 Coding 能力的提升上。 一场活动上，清华大学计算机系教授、智谱创始人唐杰点出了押注 Coding 的理由：DeepSeek R1 的出现，标志着 Chat 范式的探索已经基本结束。后DeepSeek时代的模型训练范式，他形容智谱“Bet（赌）”了 Coding 和 Reasoning——一种能与 Agent 共生共荣的模型能力。 事实证明，这是一次成功的赌注。 如今，AI Coding 已经成了 AI 商业化的最近端。一个典型的案例，是同样靠押注 Coding，对 OpenAI“弯道超车”的 Anthropic。2024 年 1 月，Anthropic 的年化收入还只有 8700 万美金；2026 年 6 月，它的 ARR 已经突破 470 亿美元， 2025 年 7 月发布的旗舰模型 GLM-4.5，到 2026 年 6 月上线并开源的 GLM-5.2，让智谱跻身全球 AI Coding 第一梯队。 开源的 GLM-5.2，多个核心指标已经追平甚至超过了 Claude Opus 4.8，以及 GPT-5.5。 技术能力，也体现在了营收上。智谱 2025 年财报显示，截至报告期末（2026 年 3 月），MaaS 平台的 ARR 达到了 17 亿元，过去一年提升了 60 倍。 而唐杰的内部信，向我们展示了后 Coding 时代，智谱押注的新命题： 长程任务能力 （Long Horizon Task） 完全自治的智能体系统 （Autonomous Agent System） 自我进化 （Self-Evolving） 以下是唐杰的内部信内容： 巨浪已来 ——致每一位智谱人和关心人工智能未来的伙伴 请允许我借这篇文章，谈三件事：我们是谁，我们如何看待这个时代，以及我们决定全力倾注的战略方向。 （一）我们是谁：“本质、反直觉、专注” 智谱从不是一家追风口的公司。它从一间实验室里长出来，带着这间实验室二十年的方法论。这套方法论可以用三个词概括：本质、反直觉、专注——想得足够深，才敢选得足够反；选得足够反，就必须守得足够久。 回望来路，我们几乎每一个关键选择都曾经显得“反直觉”。2006年，我们守着一台台式机上的学术搜索系统坐冷板凳，因为我们想清楚了那背后是“挖掘学科演化机理”这件值得用十年回答的事；2021到2022年，当“让机器像人一样思考”被绝大多数人视为登月般的疯狂计划时，我们抽调资源、押注千亿参数，做出了GLM-130B——那是ChatGPT引爆世界整整一年半之前；而在智谱2026年1月8日H股上市的那一天，我们把它当作一个全新的起点，坚定地全面回归基础模型研究，全力冲击下一代模型。 别人敲钟，我们归零。这不是姿态，这是信念——既然终点是AGI，那么短期利益或者行业风口，都只是通向终局的沿途风景。 支撑我们一路走到今天的，是一种极致的专注和至真至纯的理想主义。学术搜索系统从一台台式机做到千万用户，我们用了十年；大模型这条路，我们又做了近十年，并且还会坚定深耕，继续走下去。今天的智谱，是一群愿意追问本质、敢于反直觉，又能专注地把事情做到底的人——这就是智谱核心竞争力的来源。 （二）我们如何看待这个时代：智能的上界正在被改写 如果说过去二十年我们学会了一件事，那就是：真正的商业机会，从来不在产品和模式的微调里，而在智能上界的跃迁中。这是我们对当下AI变革最根本的判断，也是我们最想传递给大家的认知。 这一次变革，本质不是一次产品创新或商业模式创新，而是技术革命本身抬高了“智能上界”。谁能率先将该上界向上推升一寸，谁就能重新定义千行百业的能力边界。所有聚焦第一性原理的新一代AI企业，争夺的正是这一寸的突破。 而智能上界的演进，有一条清晰的路径。人工智能正在完成从感知智能到认知智能的跨越——机器不再只是“看见”和“听见”，而是开始“理解”和“推理”。而下一步，正指向AGI。 我们对AGI有一个朴素而苛刻的定义：AGI不是某一个天才的智慧，而是全人类智慧水平的总和。它理应具备创造出“相对论”级别原创知识的能力，这是我们衡量是否真正到达巅峰的唯一标准。通往这个终点的道路上，有几座必须翻越的山峰，它们也正是今天技术浪潮最汹涌的地方： 第一座： 长程任务能力（Long Horizon Task） 今天最令人兴奋的突破，是让模型学会完成一个极长的任务——不是即时问答，而是跨越数周、数月乃至数年的规划与执行。例如，一个模型可以不知疲倦地在软件中寻找漏洞，本质上是在学习一名顶级安全专家的思维方式，然后通过机器的耐力把它放大。 第二座： 完全自治的智能体系统（Autonomous Agent System） 在长程任务之上，能够自主驱动、协同作业、7×24小时运转的智能体群体将成为新的生产力形态。我们曾提过“一人公司OPC”，但技术的脚步比预想更快——我们正在走向“全自动化公司NPC”。记忆（Memory）、持续学习（Continual Learning）、自我评判（Self-Judge）这三个曾被认为需要范式变革才能解决的难题，现已在技术与应用的双重驱动下逐步消解：长上下文与检索增强生成（RAG）逼近记忆雏形；模型迭代频次的提升本身即在逼近持续学习；前沿模型已显露自我评判的萌芽。 第三座： 自我进化（Self-Evolving） 这是最艰难、也最诱人的一座。AI训练AI已经成型——模型自己写代码、自己清洗与合成数据、自己训练自己。这或许会消耗一些算力，却节省了最宝贵的人力与时间。而在大模型时代，速度是最重要的，快速迭代会直接拉开认知的代际差距。当海外头部企业开始筹建百万乃至两百万芯片级别的算力集群，其真正的用途，很可能正是让模型自己训练自己。 翻过这三座山之后，会发生什么？ AI将开始学习什么是“我”，什么是自我认知；再往后，它会触及人类的情感；更远处，是意识本身。从感知到认知，从认知到通用，从通用走向超级智能（ASI）——这条路已经铺开，巨浪已来，且不可逆转。 这并非我们一家之言。Google DeepMind在《From AGI to ASI》报告中给出了一个冷峻的论断：即便单个模型的能力永远停在人类水平，只要算力还在增长，超级智能可能会被硬生生“挤”出来。他们推演，若全球可运行AGI实例以每年十倍速增长，五年后将达一亿个。这些共享同一底层大脑、思考效率百倍提升且零成本复制经验的智能体，在群体层面即等同于ASI。换言之，从AGI迈向ASI，既需要算法层面的突破，也需要超大算力资源的汇聚。 这种不可逆转的趋势将自上而下穿透整个技术栈：当AGI到来，今天的应用或许都要被重构为AI原生，甚至不再需要这些应用；操作系统可能被重写，未来你打开电脑，看到的将是一个“LLM OS”，所有功能按需生成（generate on demand）；再往深处，是对运行了八十年的冯·诺依曼体系的挑战。金融、法律、电商、互联网……没有一个行业会置身事外。很多朋友找到我，说想变革企业、追赶AI的步伐，但真正洞察到“这场不可逆变革已然开启”者，仍属寥寥。 （三）我们全力倾注的方向：“摸高” 认清趋势之后，剩下的就是选择。而智谱的选择，一如既往地“反直觉”—— 在行业普遍加速商业变现的当下，我们决定向上突破。 我们将这一战略命名为 “Touch High（摸高）计划”。在人工智能从感知、认知向完全通用智能跨越的历史节点，智谱将以“摸高”的姿态，挑战当前技术的物理与算法极限。未来两年，我们计划战略性投入——不追求短期的应用变现，而是直指AGI的下一个高地。 这笔投入将集中在四大核心引擎上： 其一，长程任务。让AI从“即时问答”走向“宏大工程”，研发新一代记忆架构，使模型贯穿项目全生命周期“边学、边做、边记”，并具备将宏大目标（如“设计一种新型抗癌药物分子”）自主拆解为数千个可执行子任务的顶层能力。 其二，自治智能体系统。从“智能助手”走向“数字员工”，构建包含成千上万个不同专业“性格”与“技能”的智能体社会，让它们自主辩论、协作、审查代码、调度资源，实现“自动驾驶”级别的数字生产力。 其三，完全自我训练（Fully Self Training）。在人类高质量数据即将耗尽之际，把算力转化为进化的燃料——建设高质量合成数据工厂，通过AI与AI的博弈对抗（Self-Play）实现知识的“无中生有”，并在安全沙盒内赋予系统重构自身代码的能力，让进化速度挣脱人类工程师的物理限制。 其四，极致安全治理。这是四大引擎中我最想着重强调的一个。 能力越强大，安全约束机制也必须越稳固。智谱创立伊始即确立准则：AI必须服务于人类福祉，服务于国家战略。公司摒弃外挂式安全补丁，坚持将人类伦理、社会规范及国家法律法规作为底层公理写入模型价值函数；计划投入百亿级资源攻坚“机械可解释性”，厘清模型决策背后的神经元逻辑，推动黑盒系统向透明可解释系统转变；同时积极参与国际AI治理，防范AI技术被滥用。 这种紧迫感并非杞人忧天。当海外最前沿的顶级模型因风险考量而暂缓全面公开发布，其企业负责人公开警示AI的深远影响将深刻重塑全球力量格局时，我们更应清醒：超级智能的实现与超级对齐的研究，必须同步推进。这也是我们在面对颠覆性技术时反复审视的命题——历史一再表明，当一项技术抵达足以改变文明进程的力量量级时，安全就不再是附属品，而是技术得以存续与被允许应用的根本前提。 （四）开放生���：智能普惠和安全治理的底层逻辑 我们始终认为，人工智能作为引领未来的战略性技术，其长远发展离不开开放协同的产业生态。前沿智能的价值不仅在于技术突破本身，更在于它能否广泛赋能千行百业、惠及每一位开发者。我们坚信，真正的安全并非建立在技术封闭与壁垒之上，而是源于阳光下广泛的共建、共享与监督。 正是基于对技术普惠的深刻认同，智谱给出了自身的战略答卷。近日，我们发布了迄今能力最强的开源模型 GLM-5.2，它支持真正可用的百万（1M）上下文，在长程任务上继续保持领先，面向全量用户开放，并将以最宽松的 MIT 协议正式开源——任何人都可以下载、部署、商用，没有主体界别。这是公司以产品形态表达的坚定态度。 我们选择相信另一条路：前沿智能不应只属于少数人，也不应被少数规则随时收回。它应该开放、可用、可构建，并服务于每一位开发者。 这与“摸高”并不矛盾，反而是一体两面：我们一只手向上摸高，挑战智能的极限；另一只手向下铺路，让最前沿的能力尽可能地开放与普惠。摸到的高度属于全人类，修成的道路也属于每一个人。 （五）结语：为什么是现在，为什么是我们 有人会问：为什么智谱上市后反而还要继续倾注核心资源、向最不确定的方向“摸高”？因为我们相信一个朴素的道理：真正的登顶者，会把山修成路。 我们想清楚的那个本质，曾通过“悟道大模型”项目凝聚成几百位科学家的共识，又通过智谱的产业投资和整个生态，变成一代创业者起跳的基石。今天，我们想把这条路修得更高、更宽——高到能保护我们自己、守卫国家安全，高到能让人类有机会探索更多未知，探索宇宙的奥秘；也宽到能让每一位开发者、每一个团队，都走得上来。 在AGI时代，这些曾经遥不可及的事，第一次有了实现的可能。这正是我们这一代国人最大的幸运，也是最重的责任。 巨浪已来，趋势不可逆转。智谱要做那个迎着浪头、向上摸高的人。 不登顶，就是失败。 这一次，我们要摸到的，是属于全人类的那个高度。 智谱创始人 唐杰 2026年7月11日",

      "summary": "今日热点导览 “全球首款智能体手机”已备货8万至10万台？知情人士：假的 百亿私募数量达142家，再次刷新历史纪录 三星李在镕拟于7月底赴美会晤英伟达黄仁勋 德国大众拟大裁员，最高或裁减12万个岗位 OpenAI高管层再现变动，首席运营官因病离职 TOP3大新闻 长鑫科技，承销团阵容公布&nbsp; 长鑫科技IPO进入发行倒计时，这家“国产存储第一股”背后的承销团阵容也随之浮出水面。最新披露的招股意向书显示，长鑫科技预计7月16日发行。本次IPO中，中金公司、中信建投担任联席保荐机构及主承销商，国泰海通、国元证券、华泰联合、招商证券担任联席主承销商，合计6家券商组成承销团。 这是一支少见的“豪华承销团”。一边是中金、中信建投、国泰海通、华泰联合、招商证券等头部投行密集出现，另一边是安徽本土券商国元证券进入主承销名单。更有意思的是，多家主承销商同时也是长鑫科技股东，投行收入之外，股权投资收益才是这单IPO更大的想象空间。（财联社） SK海力士登陆美股，上市首日大涨近13%&nbsp; 韩国芯片巨头SK海力士美东时间7月10日登陆科技股云集的纳斯达克交易所，此举将为其打通一条强力全新融资渠道，方便全球投资者布局高速增长的人工智能基础设施赛道。这家全球第二大存储芯片厂商计划通过在纳斯达克发行美国存托凭证(ADR)募资约40万亿韩元(折合265亿美元)。本次发行共计1.779亿份美国存托凭证，发行价定为每份149美元，1份ADR对应其在韩国首尔交易所上市普通股的十分之一。 上市首日开盘价报170美元，较发行价149美元涨约14.1%，盘中一度触及177美元，涨幅扩大至约18.8%，收盘报168.01美元，日内涨约12.8%，对应市值约1.22万亿美元。(新浪财经、华尔街见闻) OpenAI推出ChatGPT Work智能体，可持续数小时跟进任务 OpenAI推出由GPT-5.6驱动的ChatGPT Work，这是最新的前沿模型系列，全新Chatgpt桌面应用将聊天、工作与Codex整合在一起。ChatGPT Work是一款可跨各类应用与文件执行操作的智能体，必要时能持续跟进项目数小时，可直接将目标转化为已完成的工作成果。它可跨各类应用和工作流收集信息，生成表格、幻灯片、文档、网页应用等成品内容，还能通过拆解为小步骤独立执行，数小时持续跟进复杂项目。（财联社） AI最前沿 三星研发AI PC加速芯片GAIA，已向联想、惠普提供样片测试 7月10日，据报道，三星电子正在研发一款名为GAIA的AI PC加速芯片，并已向联想集团和惠普提供原型产品进行性能测试，计划于明年开始量产。GAIA采用4纳米制程工艺，搭载神经处理单元（NPU），面向生成式人工智能任务，并设计支持存算一体（PIM）技术。（界面新闻） 马斯克称低估Anthropic，表示不会因竞争切断其支持 马斯克当地时间7月9日在社交平台表示，自己此前对人工智能公司Anthropic的判断“明显错误”，并称Anthropic“目前显然是AI领域的领先者”。马斯克说，“目前没有任何公司发布过像Mythos/Fable这样优秀的模型”。马斯克表示，即使Anthropic是竞争对手，他也不会采取会严重伤害该公司的措施。此前有社交平台用户称，Anthropic依赖从SpaceX租用的计算资源，并讨论如果SpaceX停止相关服务可能带来的影响，马斯克对此回应称不会采取类似行动。（界面新闻） 蚂蚁灵波发布LingBot-VA 2.0 36氪获悉，7月10日，蚂蚁灵波发布业界首个具身原生世界动作模型LingBot-VA 2.0。它代表了具身智能发展的一种关键路线选择：机器人“大脑”不再依托数字世界模型能力的“嫁接”，而是从动态建模、因果预测、实时执行等与环境交互的原始需求出发，进行原生设计。 扎克伯格否认Meta算力过剩，称发展云业务具商业潜力 当地时间7月9日，Meta首席执行官马克·扎克伯格表示，Meta需要尽可能多的算力资源。不过，在AI开发和运行所需算力供不应求的情况下，他也在思考将部分AI基础设施出租给外部客户是否能创造更多价值。扎克伯格在接受采访时表示：“目前市场对算力的出价非常高，某些情况下，与其留作内部使用，不如把它租出去，或者考虑类似交易可能更划算。”此前有消息称，Meta正筹划开展云计算业务，希望借助公司的数据中心和其他算力合作伙伴，直接创造收入。扎克伯格表示，发展云业务的机会“始终存在，只要我们想做，随时都可以”。不过，他强调，这并不意味着Meta已经过度建设，或拥有闲置算力。扎克伯格表示：“我不知道业内有谁会觉得自己的算力太多。”他补充称，Meta目前正在使用手头所有算力资源。（界面新闻） 大公司/大事件 “全球首款智能体手机”已备货8万至10万台？知情人士：假的 7月10日有媒体报道，字节跳动联合中兴努比亚打造的全球首款AI智能体手机计划于2026世界人工智能大会期间亮相开售，现已备货8万至10万台，首批总量50万台，规模远超上代。对此，知情人士回应：假的！此次大会上，仅为该款手机首次公开展示，并非开售，更无备货数万台之说。（证券时报） 美国佛州棕榈滩机场正式以特朗普冠名&nbsp; 经美国联邦航空局批准，佛罗里达州棕榈滩国际机场7月9日正式更名为“唐纳德·特朗普国际机场”。佛州共和党籍州长罗恩·德桑蒂斯3月30日签署了相关法案。据美联社报道，此次更名预计耗资550万美元，用于更换标志和品牌形象等。（新华社） 小红书：世界杯后小红书App使用时长、日均发布等环比速度大幅提升 36氪获悉，7月10日，小红书数据显示，因为世界杯，7月，小红书App使用时长环比增速提升了2倍，日发布笔记数环比增速是6月的3倍，互动直播场景中长时间观播的用户同比增长近5倍。小红书同时宣布，上海街超、苏超、佛山西甲、楚超、贵州村超等十二个省市地方足球联赛正式集体入驻小红书。小红书将为入驻联赛提供流量扶持、内容运营等支持。 MiniMax闫俊杰：不再领取薪酬，个人拿出5%公司股份用于团队激励和开源支持 MiniMax创始人兼CEO闫俊杰发布内部全员信，回应近期市场波动，并强调公司长期方向不变。闫俊杰在信中宣布，从即日起，直到公司实现AGI的那一天，他将不再从公司领取任何薪酬。未来四年，他将拿出个人名下相当于公司总股本4%的股份，用于激励长期与公司并肩作战、共同创造价值的团队成员；同时拿出1%的股份设立专项基金，持续支持相关开源社区的发展。（财联社） 创世纪：因未及时披露重大诉讼进展，公司及两人被出具警示函 36氪获悉，创世纪公告，公司近日收到广东证监局下发的警示函，因2025年12月全资子公司深圳创世纪专利侵权二审被判赔偿3.82亿元，未按期履行赔偿义务致账户被冻结、资金被划扣，公司未及时披露相关情况，且未在2025年年报披露执行情况。公司董事长夏军、董事会秘书伍永兵对违规行为负主要责任。公司应30日内完成整改并报送报告，已就案件申请再审。 百亿私募数量达142家，再次刷新历史纪录 私募排排网数据显示，截至2026年6月30日，百亿私募数量达142家，较5月末的139家增加3家，较去年底的113家增加29家，再次刷新历史纪录。（证券时报） 胜宏科技回应英伟达传闻：与核心客户合作平稳有序，产能建设、产品交付均按计划推进 36氪获悉，有投资者在互动平台向胜宏科技提问，近期外媒有传言英伟达Rubin服务器架构延迟推出。对此，胜宏科技表示与核心客户合作平稳有序，产能建设、产品交付均按计划推进。受商业政策限制，未经许可公司不便讨论具体客户名称及业务情况。关于未经证实的市场传闻，请投资者注意甄别信息来源，慎重决策。 AI原生信用卡Kimi信用卡敲定美国运通、农业银行 全球首张AI（人工智能）原生信用卡“Kimi信用卡”合作方已经敲定美国运通、农业银行，并将于当日正式对外发行。对于合作，相关知情人士评价称“一拍即合”。该项目从今年4月开始酝酿，短短几个月，农业银行和运通内部一路绿灯加急。具体到本次合作规则，上述知情人士透露，目前已达成的意向是，持卡人的日常消费积分可八折兑换Kimi会员权益。积分商城的积分兑换比例是1000∶1，最高支持50%用积分兑换。未来，三方还将探索智能体支付、Token额度和信用额度挂钩、积分和算力双向打通等更多可能性。（每日经济新闻） 美联储主席沃什敲定央行改革顾问团队人选，前英国央行行长等知名人士在列 前英国央行行长默文・金、加密货币投资人马克・安德森等人入选美联储主席凯文・沃什牵头组建的顾问团队，协助美国中央银行推进现代化改革。凯文・沃什此前以改革现有运行体系为核心纲领参选美联储主席，他于当地时间7月9日公布五个专项工作小组名单，称这些团队将对这家全球最重要的金融机构进行职能优化。（新浪财经） 德国大众拟大裁员，最高或裁减12万个岗位 德国大众汽车集团当地时间9日召开监事会会议，就新一轮降本计划进行讨论。记者获悉，方案可能涉及进一步裁减岗位和调整德国工厂布局，全球裁员规模最高或达10万至12万个岗位，包括茨维考、汉诺威、埃姆登和内卡苏尔姆在内的德国部分工厂面临关闭风险。大众方面表示，公司正研究未来发展规划，目标是提升集团竞争力，并表示需要削减过剩产能，但具体方案仍在监事会讨论之中。针对相关计划，德国金属工业工会当天在德国多个大众汽车生产基地组织抗议活动，反对关闭工厂和进一步裁员。德国下萨克森州政府也对相关计划表示反对，认为关闭工厂不是企业未来发展的解决方案。（央视财经） 谷歌要求AI广告必须标注：涵盖搜索和YouTube等 当地时间7月9日，谷歌宣布全面扩大生成式AI广告的披露范围。新规要求在谷歌搜索、YouTube和Discover信息流中，对由AI创建或编辑的商业广告进行明确标注，以防消费者被虚假合成场景误导。（界面新闻） 美联储前主席伯南克加入Anthropic长期利益信托机构 当地时间7月9日，人工智能公司Anthropic宣布，任命美国联邦储备委员会前主席本·伯南克加入其长期利益信托机构，该机构负责监督Anthropic长期使命，即推动人工智能以安全、负责任的方式发展，并确保AI技术长期造福社会。（界面新闻） 消息称台积电CoWoS 2027年月产能目标至少20万片 据台湾电子时报，先进封装产能持续供不应求，台积电加速扩产。供应链指出，台积电所有新厂工程几乎都是24小时轮班施工，加速建设进度。设备厂商表示，据台积电释放出的信息来看，CoWoS月产能2024年约3万多片，2025年达7万片，2026年底原订11万片，但最终突破13万片，2027年扩产目标约20万片，但应为低标。市场乐观看待2027年底CoWoS月产能有望拉升至24万~26万片。不过，台积电至今仍未确立设备商的订单分配，导致供应链如坐针毡，担心形成降价抢单氛围，此外设备下单至生产出货时程至少7~9个月，供应商担心无法如期交付设备。（财联社） 三星李在镕拟于7月底赴美会晤英伟达黄仁勋 7月10日，据报道，三星电子会长李在镕正计划于今年7月底前往美国会晤英伟达首席执行官黄仁勋。据悉，双方此行的核心议题将围绕三星在韩国西南部的投资计划展开。为了确保三星规划中的光州晶圆厂以及京畿道龙仁半导体集群的顺利落地，三星急需提高对英伟达的组件供应比例。与此同时，为了建设人工智能数据中心服务器，三星确保能稳定获取英伟达的AI芯片也至关重要。（界面新闻） 联合国自动驾驶全球法规正式落地，中国智驾出海迎来统一规则窗口期 近日，联合国世界车辆法规协调组织（UN/WP.29）第199次全体会议传来重磅消息：由中国、欧盟、英国、美国、加拿大、日本共同牵头制定的自动驾驶系统全球统一技术法规（ADS GTR）完成全体缔约方投票并正式发布。这套法规实现全球L3及以上自动驾驶统一标准从无到有的突破，重构全球智能驾驶监管底层逻辑，也为具备成熟智驾技术的中国车企出海扫清关键合规障碍，标志中国汽车产业正式从产品、技术出海，迈入参与全球规则制定的全新阶段。（中证报） SK海力士赴美上市，华尔街投行合计佣金有望达1.4亿美元 参与SK海力士上市项目的投行团队将斩获上亿美元丰厚佣金。这家市值突破万亿美元的韩国芯片巨头即将登陆美股，本次发行有望跻身史上规模最大IPO行列。两名熟悉该交易的人士透露，高盛、花旗等承销本次纳斯达克股票发行的投行，总佣金池规模或将突破1.4亿美元；佣金由两部分构成，一是募资总额0.5%的基础承销费，二是SK海力士另行支付的浮动激励奖金。（新浪财经） OpenAI高管层再现变动，首席运营官因病离职 OpenAI于当地时间9日宣布，公司第二号人物、负责产品与商业化业务的首席运营官菲吉·西莫（Fidji Simo）因健康状况恶化，决定在医疗休假结束后不再回归全职岗位，将转任公司兼职顾问。此举标志着这家正筹备首次公开募股（IPO）的科技企业再度迎来高管层洗牌。（新浪财经） 段永平增持泡泡玛特持股比例升至7.65% 36氪获悉，据港交所披露，知名投资人段永平再度增持泡泡玛特股票，持股数量由9127.28万股增至1.02亿股，持股比例由6.85%增至7.65%。 摩根大通和花旗银行家据悉将加入香港交易所上市委员会 据知情人士透露，摩根大通的白思佳和花旗的Alexander Schrantz将加入香港交易所负责批准首次公开募股的委员会。（新浪财经） 上市进行时 文峰光电北交所IPO过会 36氪获悉，7月10日，北交所上市委员会召开2026年第66次审议会议，审议结果显示，淮南文峰光电科技股份有限公司符合发行条件、上市条件和信息披露要求。 大公司财报 舍得酒业：预计上半年净利润同比下降60.52%-69.55% 36氪获悉，舍得酒业公告，预计2026年半年度归属于上市公司股东的净利润为1.35亿元-1.75亿元，同比减少60.52%-69.55%。业绩变动主要系白酒行业深度调整，消费动能偏弱，公司主动控货稳价，同时加大市场投入，导致业绩同比下降。 中信证券：预计上半年净利润同比增长69.59% 36氪获悉，中信证券公告，预计2026年半年度归属于母公司所有者的净利润为233.43亿元，同比增长69.59%。业绩变动主要系2026年上半年资本市场稳中向好，公司各项业务协同发展，经营业绩创同期历史新高。 香农芯创：预计2026年半年度净利润同比增长2118%-2434% 36氪获悉，香农芯创公告，预计2026年半年度归属于上市公司股东的净利润为35.00亿元-40.0       "title": "36氪首发 | 三个月融三轮，上交大00后博士让具身智能仿生扑翼机器人理解并驾驭流体",
      "summary": "图源/企业 本文约 2400 字，建议阅读 6 分钟 作者丨欧雪 编辑丨袁斯来 硬氪获悉，具身智能仿生扑翼飞行机器人公司「鹰瞰智翼」已于近期完成数千万元A轮融资。本轮融资是公司在三个月内完成的第三轮融资，由元禾璞华领投，孚腾资本、厚雪资本跟投。资金将主要用于首款消费级产品的量产备货、市场拓展，团队扩充以及下一代具身智能扑翼机器人与流体仿真引擎的研发。 「鹰瞰智翼」2025年3月成立于深圳，是全球较早专注于具身智能扑翼机器人的公司之一。创始人陈昊为上海交通大学机械工程直博生，团队研发人员占比超75%。当前核心成员来自上海交通大学、大疆、华为、字节等高校及科技企业，兼具前沿科研、全球化市场和互联网运营经验，持续推动流体智能技术产业化。 硬氪了解到，扑翼飞行与旋翼无人机的本质差异在于对流体的处理方式。旋翼通过高速旋转与流体对抗，而扑翼则是利用流体飞行。 目前，「鹰瞰智翼」的产品分为两条路线演进。首款消费级产品“Eagle X”（原代号“丹丹”）的核心逻辑是“借助流体飞行”——通过扑翼结构实现滑翔与拍打的混合模态，在气流中借势飞行。该产品已完成累计超3000小时飞行测试，目前进入量产阶段，今年Q3上线KickStarter。 鹰瞰智翼首款消费级产品Eagle X（图源/企业） 第二款产业级产品则从“被动借力”升级为“主动驾驭”。该产品具备约15个自由度，能够主动感知并利用气流，而非被动滑翔。其技术基础是公司自研的机器人流体仿真引擎Vortrix。 陈昊向硬氪解释，扑翼飞行的关键在于让机器人在虚拟世界中先理解流体，通过强化学习完成数百万次迭代训练，再零样本迁移到真实物理样机。 “没有这个引擎，机器鸟只能在风洞里一次次试飞，周期长、成本高。”陈昊称。 具身智能仿生扑翼机器人及其流体仿真引擎（图源/企业） 该引擎的另一层价值在于数据。每台飞行器在空中采集的真实流体数据，将反哺仿真引擎的校正，使模型与物理世界持续对齐。陈昊将这一闭环类比为特斯拉的自动驾驶数据飞轮：“采集到的流体数据可能比样机本身更值钱。” 在产品落地上，「鹰瞰智翼」选择先做海外C端。陈昊介绍，“EagleX”面向海外极客群体。该产品强调开放性与可玩性：机身预留多种接口，用户可自行设计并更换翅膀、烧录程序、挂载相机等。团队有意将其打造成一个平台而非封闭产品，以吸引开发者社区自主探索玩法。 陈昊表示，海外极客群体大、传播效率高，适合快速验证PMF。同时，消费级产品能倒逼团队在量产、售后、品牌等方面提前建立能力。 谈及当前最大挑战，陈昊认为是市场拓展能力。“现在很多客户是看到产品主动找过来，成交率很高，但我们不能一直被动接单。”随着产品量产和众筹推进，团队将在下半年适度扩张，重点补充市场、渠道及售后力量。 以下为硬氪与陈昊的对话节选（经编辑）： 硬氪：扑翼机的技术难度具体体现在哪里？你们如何建立自身的技术壁垒？ 陈昊： 难点在于非线性非稳态的气动力建模。旋翼无人机的动力学相对线性，有成熟的PID控制方法。扑翼每一次拍打，升力和推力是耦合变化的，而且受实时气流影响很大。传统的做法是靠风洞试飞反复调参，周期很长。 我们的解法是自研流体仿真引擎Vortrix。先用真实风洞数据结合粒子法建模，再在仿真环境里用强化学习训练，让机器鸟自己学会在不同气流下怎么调整翅膀角度、拍打频率。训练几百万次之后，直接部署到真机上。没有这个引擎，快速进行包含流体的强化学习训练根本做不到。 硬氪：流体仿真引擎Vortrix未来打算怎么商业化？ 陈昊： 在早期Vortrix不会对外开放，更多是赋能我们自己的具身智能仿生扑翼机器人产品，用户可以选择订阅我们的具身智能飞行控制方案，实现悬停、落叶飘、倒着飞、长续航飞行、大载重飞行等不同的飞行能力。 到达一定的时机，我们可能会把引擎对外开放，服务各类飞行机器人的强化学习训练甚至是固定翼飞行器、民航飞机甚至风电叶片的气动优化，让他成为整个低空经济的基座。 硬氪：你们提到第二款产品具备约15个自由度，为什么自由度如此关键？ 陈昊： 市面上的扑翼机大多以极致减重为目标，翅膀只能对称拍打，自由度很低。这种设计能飞，但它没办法主动应对复杂气流——风来了只能“被动借力”，而没有足够的能力调整姿态去“主动驾驭”它。 我们的第二款产品把自由度扩展到约15个，翅膀可以独立调整角度、扭转、折叠，就像真鸟一样。这个状态-动作空间足够大，强化学习算法才有发挥空间。你可以理解为我们先造了一个足够灵活的“身体”，再让AI去学习怎么用这个身体飞行。整机的翅膀和腿部结构我们已经分别申请了专利，并做好全球专利布局。这是我们从“会飞的机器”走向“具身智能体”的关键一步。 投资方观点： 元禾璞华（领投方）： 从半导体底层基座，延生到AI全域硬科技布局是璞华长期坚持的核心投资主线。当下地面人形、四足机器人赛道日趋拥挤，而仿生飞行机器人尚处于产业萌芽阶段，兼具高技术壁垒、广阔大众消费市场与长期产业延展性，成长天花板极高。技术层面，鹰瞰依托自研Vortrix流体仿真引擎+强化学习全栈算法，实现仿生飞行本体与空中具身智能深度耦合。低噪、高安全、生物兼容的天然优势，完美补齐近人场景核心痛点。团队层面，全员00后交大博士，具备从顶刊学术、整机结构、AI飞行控制、流体仿真底座的全链路自研能力。我们坚定领投鹰瞰，看好企业开辟近人消费新赛道，前景广阔，未来可期！ 孚腾资本： 传统旋翼无人机在近人场景中，噪音、安全及生物融入问题长期待解。鹰瞰智翼以仿生扑翼另辟蹊径，其自研的流体仿真引擎Vortrix结合强化学习训练，让机器鸟在虚拟环境中自主习得应对复杂气流的飞行姿态，并通过AI自主决策。创始人陈昊及联创团队全员为00后的交大硕博，通过一年时间将学术验证推进至样机量产筹备，执行力令人印象深刻。我们看好其将技术优势转化为实际产品的潜力，并对扑翼市场的未来充满信心。 厚雪资本： 仿生鸟类空中具身智能是低空经济与具身智能的黄金交叉赛道。鹰瞰智翼自研扑翼控制与空中具身算法，产品低噪、机动性突出，适配巡检、生态监测等场景。地面物理 AI 赛道日趋拥挤，空中具身智能仍是蓝海。本轮融资将助力企业技术与商业化提速，打造领先的国产仿生飞行机器人标杆。",

// 渲染
const grid = document.getElementById('grid');
const filterGroup = document.getElementById('filterGroup');
const searchInput = document.getElementById('searchInput');
const sortSelect = document.getElementById('sortSelect');

let currentFilter = 'all';
let currentSearch = '';
let currentSort = 'time-desc';

function render() {
  let list = DATA.hotspots.slice();

  // 筛选分类
  if (currentFilter !== 'all') {
    list = list.filter(h => h.category === currentFilter);
  }
  // 搜索
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(h =>
      h.title.toLowerCase().includes(q) ||
      h.summary.toLowerCase().includes(q) ||
      h.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  // 排序
  if (currentSort === 'time-desc') {
    list.sort((a,b) => b.publish_time.localeCompare(a.publish_time));
  } else if (currentSort === 'time-asc') {
    list.sort((a,b) => a.publish_time.localeCompare(b.publish_time));
  } else if (currentSort === 'category') {
    const order = {'大模型':0,'芯片':1,'新产品':2};
    list.sort((a,b) => order[a.category] - order[b.category]);
  }

  if (list.length === 0) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>没有匹配的热点，换个关键词试试</p></div>';
    return;
  }

  grid.innerHTML = list.map(h => `
    <div class="card" data-category="${h.category}" data-url="${h.url}">
      <div class="card-header">
        <span class="category-tag ${h.category}">${h.category}</span>
        <span class="time-tag">${h.publish_time.slice(5)}</span>
      </div>
      <h3>${h.title}</h3>
      <p>${h.summary}</p>
      <div class="card-footer">
        <div class="card-tags">
          ${h.tags.slice(0,3).map(t => `<span class="card-tag">#${t}</span>`).join('')}
        </div>
        <a href="${h.url}" target="_blank" class="card-link" onclick="event.stopPropagation()">原文 →</a>
      </div>
    </div>
  `).join('');

  // 卡片点击跳转
  document.querySelectorAll('.card').forEach(c => {
    c.addEventListener('click', () => {
      const url = c.dataset.url;
      if (url) window.open(url, '_blank');
    });
  });
}

function updateCounts() {
  const counts = {
    all: DATA.hotspots.length,
    '大模型': DATA.hotspots.filter(h => h.category === '大模型').length,
    '芯片': DATA.hotspots.filter(h => h.category === '芯片').length,
    '新产品': DATA.hotspots.filter(h => h.category === '新产品').length
  };
  document.getElementById('cntAll').textContent = counts.all;
  document.getElementById('cntAI').textContent = counts['大模型'];
  document.getElementById('cntChip').textContent = counts['芯片'];
  document.getElementById('cntProduct').textContent = counts['新产品'];
  document.getElementById('statTotal').textContent = counts.all;
  document.getElementById('statAI').textContent = counts['大模型'];
  document.getElementById('statChip').textContent = counts['芯片'];
  document.getElementById('statProduct').textContent = counts['新产品'];
}

async function loadData() {
  try {
    const response = await fetch(`data.json?ts=${Date.now()}`, { cache: 'no-store' });
    if (!response.ok) throw new Error(`data.json ${response.status}`);
    DATA = await response.json();
  } catch (error) {
    console.warn('Using inline fallback data:', error);
  }
}

async function init() {
  await loadData();
  document.getElementById('navDate').textContent = `${DATA.date} · ${DATA.weekday}`;
  document.getElementById('heroDate').textContent = `📅 ${DATA.date}（${DATA.weekday}）`;
  document.getElementById('heroSummary').textContent = DATA.summary;
  document.getElementById('updateTime').textContent = DATA.date;
  updateCounts();
  render();
}

filterGroup.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.filter;
  render();
});

searchInput.addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  render();
});

sortSelect.addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

init();
</script>
